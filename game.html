<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body { margin:0; overflow:hidden; background:#05050f; font-family:'IM Fell English SC',Georgia,serif; }

        #biome { position:absolute; top:18px; right:20px; color:#d4af37; pointer-events:none; z-index:10; text-shadow:0 0 10px #000; font-size:15px; letter-spacing:1px; }
        #crosshair { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#ffd700; font-size:24px; pointer-events:none; z-index:10; text-shadow:0 0 12px #000; opacity:0.55; }
        #stamina { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); width:240px; height:10px; background:rgba(0,0,0,0.55); border:1px solid #d4af37; z-index:10; }
        #stamina > div { height:100%; width:100%; background:linear-gradient(90deg,#d4af37,#fff0a8); transition:width 0.08s linear; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/utils/SkeletonUtils.js"></script>
    <script>
        window.addEventListener('error', e => {
            const d = document.createElement('div');
            d.style.cssText = 'position:fixed;top:60px;left:20px;right:20px;color:#ff8a8a;background:rgba(0,0,0,0.85);padding:14px;font:13px monospace;z-index:9999;white-space:pre-wrap;border:1px solid #ff5050;';
            d.textContent = 'JS ERROR: ' + e.message + '\nat ' + e.filename + ':' + e.lineno + ':' + e.colno;
            document.body.appendChild(d);

</head>
<body>
    <div id="ui">WASD Move &nbsp;•&nbsp; Shift Sprint &nbsp;•&nbsp; Space Jump &nbsp;•&nbsp; E Door &nbsp;•&nbsp; LMB / L Swing &nbsp;•&nbsp; Click lock &nbsp;•&nbsp; ESC release</div>
    <div id="biome">— The Long Night —</div>
    <div id="crosshair">+</div>
    <div id="stamina"><div></div></div>
    <div id="objstatus" style="position:absolute;top:48px;left:20px;color:#ffa050;background:rgba(0,0,0,0.65);border:1px solid #ffa050;padding:6px 12px;z-index:11;font:13px 'IM Fell English SC',Georgia,serif;letter-spacing:1px;">TREES: loading textured models…</div>
    <div id="animstatus" style="position:absolute;top:82px;left:20px;color:#ffa050;background:rgba(0,0,0,0.65);border:1px solid #ffa050;padding:6px 12px;z-index:11;font:13px 'IM Fell English SC',Georgia,serif;letter-spacing:1px;">ANIMALS: loading animated models…</div>
    <div id="doorprompt" style="position:absolute;top:55%;left:50%;transform:translateX(-50%);color:#fff0c8;background:rgba(0,0,0,0.55);border:1px solid #d4af37;padding:8px 16px;font:14px 'IM Fell English SC',Georgia,serif;letter-spacing:1px;z-index:10;display:none;text-shadow:0 0 6px #000;"></div>

    <script>
    // ===================================================================
    //  KNIGHTFALL — open-world medieval sandbox
    //  Heightmap world with biomes, carved river valley, biome-aware flora
    // ===================================================================

    const WORLD = 1600;         // world size (m)
    const SEG   = 200;          // terrain segments
    const WATER_Y = 0.0;        // water level

    // ---------- value-noise + fBm (deterministic) ----------
    function hash2(x, z) {
        const s = Math.sin(x * 127.1 + z * 311.7) * 43758.5453;
        return s - Math.floor(s);
    }
    function vnoise(x, z) {
        const xi = Math.floor(x), zi = Math.floor(z);
        const xf = x - xi,        zf = z - zi;
        const u = xf * xf * (3 - 2 * xf);
        const v = zf * zf * (3 - 2 * zf);
        const a = hash2(xi,     zi);
        const b = hash2(xi + 1, zi);
        const c = hash2(xi,     zi + 1);
        const d = hash2(xi + 1, zi + 1);
        return (a * (1 - u) + b * u) * (1 - v) + (c * (1 - u) + d * u) * v;
    }
    function fbm(x, z, oct = 5) {
        let sum = 0, amp = 1, freq = 1, norm = 0;
        for (let i = 0; i < oct; i++) {
            sum  += vnoise(x * freq, z * freq) * amp;
            norm += amp;
            amp  *= 0.5;
            freq *= 2.0;
        }
        return sum / norm;
    }
    function ridged(x, z, oct = 4) {
        let sum = 0, amp = 1, freq = 1, norm = 0;
        for (let i = 0; i < oct; i++) {
            const n = 1 - Math.abs(vnoise(x * freq, z * freq) * 2 - 1);
            sum  += n * n * amp;
            norm += amp;
            amp  *= 0.5;
            freq *= 2.0;
        }
        return sum / norm;
    }

    // ---------- river path (sinuous curve in world XZ) ----------
    // River centerline: x = riverX(z). Flows along the +Z axis.
    function riverX(z) {
        return Math.sin(z * 0.011) * 90 + Math.sin(z * 0.034) * 22 + Math.cos(z * 0.006) * 35;
    }
    // Approx perpendicular distance from (x,z) to centerline.
    // Includes dx/dz slope correction so width stays ~constant on bends.
    function distToRiver(x, z) {
        const cx = riverX(z);
        const dz = 0.5;
        const slope = (riverX(z + dz) - riverX(z - dz)) / (2 * dz);
        return Math.abs(x - cx) / Math.sqrt(1 + slope * slope);
    }
    const RIVER_HALF   = 22;   // water surface half-width (wide river)
    const BANK_HALF    = 70;   // valley half-width (smooth rise to hills)
    const RIVERBED_Y   = -6.5; // ground depth at river center (deep channel)
    const RIVERBANK_Y  = 0.2;  // ground at the water edge (just above water)

    // ---------- terrain height function ----------
    function smoothstep(a, b, x) {
        const t = Math.max(0, Math.min(1, (x - a) / (b - a)));
        return t * t * (3 - 2 * t);
    }
    function heightAt(x, z) {
        // River corridor mask: 0 right at the river, 1 far from it.
        // Used to suppress hills/mountains so the river always lies in a
        // naturally low corridor instead of being carved through a cliff.
        const dRiver = distToRiver(x, z);
        const corridor = smoothstep(BANK_HALF, 160, dRiver);

        // Large rolling hills (suppressed near the river)
        const hills    = (fbm(x * 0.0035, z * 0.0035, 5) - 0.5) * 80 * corridor;
        // Mountain ridges, far from origin AND far from river
        const ridgeAmt = ridged(x * 0.0022, z * 0.0022, 4);
        const distFromCenter = Math.sqrt(x * x + z * z);
        const ridgeMask = smoothstep(180, 380, distFromCenter);
        const mountains = ridgeAmt * 70 * ridgeMask * corridor;
        // Small surface detail (kept everywhere)
        const detail = (fbm(x * 0.05, z * 0.05, 3) - 0.5) * 2.5;

        // Baseline lift so the average terrain sits well above water level
        let h = hills + mountains + detail + 18;

        // Carve river valley.
        // Inside RIVER_HALF: ground is forced BELOW the water surface (riverbed).
        // Between RIVER_HALF and BANK_HALF: smoothly rise from the bank up to
        // whichever is lower — the surrounding terrain or the bank ceiling —
        // so the river always sits in a real depression, never on a hillside.
        const d = distToRiver(x, z);
        if (d < RIVER_HALF) {
            // U-shaped riverbed
            const u = d / RIVER_HALF;
            h = RIVERBED_Y + (RIVERBANK_Y - RIVERBED_Y) * (u * u);
        } else if (d < BANK_HALF) {
            const t = smoothstep(RIVER_HALF, BANK_HALF, d);   // 0 at bank -> 1 at edge
            const bankCeiling = RIVERBANK_Y + (1 - Math.cos(t * Math.PI)) * 6; // gentle rise ~12m
            // Take the LOWER of the natural terrain and the bank ceiling, so
            // we always carve a depression even where the hill is high.
            h = Math.min(h, bankCeiling);
        }
        return h;
    }

    // ---------- biome classification (moisture + elevation patches) ----------
    // 0 riverbank, 1 dry plains, 2 meadow plains, 3 light woodland,
    // 4 dense forest, 5 highlands, 6 mountains
    function moistureAt(x, z) { return fbm(x * 0.0014 + 91.3, z * 0.0014 - 52.7, 4); }
    function tempAt(x, z)     { return fbm(x * 0.0009 - 17.1, z * 0.0009 + 33.5, 4); }
    function biomeAt(x, z, h) {
        const d = distToRiver(x, z);
        if (d < BANK_HALF + 4 && h < 4) return 0;
        if (h > 48) return 6;     // mountains
        if (h > 34) return 5;     // highlands
        const m = moistureAt(x, z);
        if (m < 0.38) return 1;   // dry plains
        if (m < 0.55) return 2;   // meadow plains
        if (m < 0.72) return 3;   // light woodland
        return 4;                  // dense forest
    }
    const BIOME_NAMES = ['Riverbank','Dry Plains','Meadow','Woodland','Dense Forest','Highlands','Mountains'];
    const BIOME_COLORS = [
        new THREE.Color(0x6b5a3a), // 0 riverbank
        new THREE.Color(0x8a8b48), // 1 dry plains: pale yellow-green
        new THREE.Color(0x5e7a30), // 2 meadow: bright meadow green
        new THREE.Color(0x4a6a2a), // 3 woodland: medium green
        new THREE.Color(0x2c4520), // 4 dense forest: deep green
        new THREE.Color(0x6e7a48), // 5 highlands: olive/heath
        new THREE.Color(0x6a6660), // 6 mountains: cool grey
    ];

    // ===================================================================
    //  SCENE
    // ===================================================================
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0xbcc7d3, 0.0028);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1500);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    document.body.appendChild(renderer.domElement);

    // ----- SKY DOME with shader gradient driven by sun direction -----
    const sunDir = new THREE.Vector3(0.4, 0.7, 0.3).normalize();
    const skyUniforms = {
        topColor:    { value: new THREE.Color(0x2a5a9a) },
        midColor:    { value: new THREE.Color(0xc9d6e0) },
        bottomColor: { value: new THREE.Color(0xe6c98a) },
        sunDir:      { value: sunDir },
        sunColor:    { value: new THREE.Color(0xfff0c8) },
    };
    const skyMat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        depthWrite: false,
        uniforms: skyUniforms,
        vertexShader: `
            varying vec3 vWorldPos;
            void main() {
                vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform vec3 topColor;
            uniform vec3 midColor;
            uniform vec3 bottomColor;
            uniform vec3 sunDir;
            uniform vec3 sunColor;
            varying vec3 vWorldPos;
            void main() {
                vec3 v = normalize(vWorldPos);
                float h = clamp(v.y, -1.0, 1.0);
                vec3 col;
                if (h > 0.0) {
                    col = mix(midColor, topColor, pow(h, 0.6));
                } else {
                    col = mix(midColor, bottomColor, pow(-h, 0.7));
                }
                // Sun disk + glow
                float sd = max(dot(v, normalize(sunDir)), 0.0);
                float disk = smoothstep(0.9985, 0.9995, sd);
                float glow = pow(sd, 80.0) * 0.6 + pow(sd, 8.0) * 0.18;
                col += sunColor * (disk * 6.0 + glow);
                gl_FragColor = vec4(col, 1.0);
            }
        `
    });
    const skyDome = new THREE.Mesh(new THREE.SphereGeometry(900, 32, 16), skyMat);
    scene.add(skyDome);

    // ----- LIGHTS -----
    const hemiLight = new THREE.HemisphereLight(0x9ab4d4, 0x40341e, 0.85);
    scene.add(hemiLight);
    const sun = new THREE.DirectionalLight(0xfff0c8, 1.7);
    sun.position.copy(sunDir).multiplyScalar(300);
    sun.castShadow = true;
    sun.shadow.mapSize.set(1024, 1024);
    sun.shadow.camera.left = -250;
    sun.shadow.camera.right = 250;
    sun.shadow.camera.top = 250;
    sun.shadow.camera.bottom = -250;
    sun.shadow.camera.far = 1200;
    sun.shadow.bias = -0.0005;
    scene.add(sun);
    const sunTarget = new THREE.Object3D();
    scene.add(sunTarget);
    sun.target = sunTarget;

    // ----- DAY / NIGHT CYCLE -----
    // 0..1 fraction of full day. Sun sweeps through the sky over DAY_LENGTH seconds.
    const DAY_LENGTH = 720;        // 12-minute cycle (≈8.4 min day, ≈3.6 min night)
    const DAY_FRAC   = 0.70;       // fraction of cycle that is daylight
    let timeOfDay = 0.20;          // start mid-morning
    function updateSky(t) {
        // Day = sun above horizon, night = sun below.
        let sx, sy, sz;
        if (t < DAY_FRAC) {
            // s in [0..1]: 0 = sunrise, 0.5 = noon, 1 = sunset
            const s = t / DAY_FRAC;
            sy = Math.sin(s * Math.PI);                    // 0..1..0
            const horizAng = s * Math.PI - Math.PI / 2;    // -π/2..π/2
            sx = Math.cos(horizAng) * 0.6;
            sz = Math.cos(horizAng) * 0.4 + 0.2;
        } else {
            // Night arc: sun below horizon, sweeping the other way
            const s = (t - DAY_FRAC) / (1 - DAY_FRAC);
            sy = -Math.sin(s * Math.PI) * 0.6 - 0.05;
            const horizAng = Math.PI - s * Math.PI - Math.PI / 2;
            sx = Math.cos(horizAng) * 0.6;
            sz = Math.cos(horizAng) * 0.4 + 0.2;
        }
        sunDir.set(sx, sy, sz).normalize();
        sun.position.copy(sunDir).multiplyScalar(300);
        sun.target.position.set(0, 0, 0);
        // Color palettes
        const altitude = Math.max(-0.2, sunDir.y);    // -1..1 ish
        const dayK = Math.max(0, altitude);            // 0 night → 1 noon
        const horizonK = Math.exp(-Math.pow(altitude * 4.0, 2.0)); // peak near horizon
        const top = new THREE.Color(0x06112a).lerp(new THREE.Color(0x2a5a9a), dayK);
        const mid = new THREE.Color(0x1a2238).lerp(new THREE.Color(0xc9d6e0), dayK);
        let bot = new THREE.Color(0x0a0a18).lerp(new THREE.Color(0xe6c98a), dayK);
        // Sunrise/sunset color injection
        const sunsetTint = new THREE.Color(0xff8a3a).multiplyScalar(horizonK * 0.7);
        bot.add(sunsetTint);
        skyUniforms.topColor.value.copy(top);
        skyUniforms.midColor.value.copy(mid);
        skyUniforms.bottomColor.value.copy(bot);
        // Sun + light color
        const sunCol = new THREE.Color(0xfff0c8).lerp(new THREE.Color(0xff8e3c), horizonK * 0.7);
        skyUniforms.sunColor.value.copy(sunCol);
        sun.color.copy(sunCol);
        sun.intensity = 0.35 + dayK * 1.5;
        hemiLight.intensity = 0.45 + dayK * 0.75;
        hemiLight.color.copy(mid);
        // Fog matches the sky horizon
        scene.fog.color.copy(mid);
        scene.fog.density = 0.0022 + (1 - dayK) * 0.0020;
        // Renderer exposure: a touch brighter at night so player can see
        renderer.toneMappingExposure = 1.1 + (1 - dayK) * 0.5;
    }
    updateSky(timeOfDay);

    // ===================================================================
    //  TERRAIN MESH (vertex-colored by biome)
    // ===================================================================
    const groundGeo = new THREE.PlaneGeometry(WORLD, WORLD, SEG, SEG);
    groundGeo.rotateX(-Math.PI / 2);
    const pos = groundGeo.attributes.position;
    const colors = new Float32Array(pos.count * 3);
    for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = pos.getZ(i);
        const h = heightAt(x, z);
        pos.setY(i, h);
        const b = biomeAt(x, z, h);
        const c = BIOME_COLORS[b].clone();
        // small per-vertex variation
        const j = (hash2(x, z) - 0.5) * 0.12;
        c.offsetHSL(0, 0, j);
        colors[i * 3]     = c.r;
        colors[i * 3 + 1] = c.g;
        colors[i * 3 + 2] = c.b;
    }
    groundGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    groundGeo.computeVertexNormals();
    const ground = new THREE.Mesh(
        groundGeo,
        new THREE.MeshLambertMaterial({ vertexColors: true })
    );
    ground.receiveShadow = true;
    scene.add(ground);

    // Bilinear ground lookup against the terrain mesh's vertex buffer.
    // Defined here (right after the mesh) so any code below — including
    // animal spawning — can call it.
    const CELL = WORLD / SEG;
    function sampleGroundY(x, z) {
        const pos = groundGeo.attributes.position;
        const fi = (x + WORLD / 2) / CELL;
        const fj = (z + WORLD / 2) / CELL;
        let i = Math.floor(fi), j = Math.floor(fj);
        if (i < 0) i = 0; else if (i > SEG - 1) i = SEG - 1;
        if (j < 0) j = 0; else if (j > SEG - 1) j = SEG - 1;
        const ti = fi - i, tj = fj - j;
        const stride = SEG + 1;
        const h00 = pos.getY(j       * stride + i);
        const h10 = pos.getY(j       * stride + i + 1);
        const h01 = pos.getY((j + 1) * stride + i);
        const h11 = pos.getY((j + 1) * stride + i + 1);
        return (h00 * (1 - ti) + h10 * ti) * (1 - tj)
             + (h01 * (1 - ti) + h11 * ti) * tj;
    }

    // ===================================================================
    //  RIVER WATER BODY — wide ribbon at the water surface, riding atop
    //  the carved valley terrain. The terrain itself forms the riverbed,
    //  so the water has real depth and a visible body.
    // ===================================================================
    const riverMaterial = new THREE.MeshPhongMaterial({
        color: 0x2c4a66, shininess: 140, specular: 0x99bbdd,
        transparent: true, opacity: 0.78, depthWrite: false
    });
    {
        const segs = 320;
        const half = WORLD / 2;
        const verts = [];
        const uvs   = [];
        const idx = [];
        for (let i = 0; i <= segs; i++) {
            const z = -half + (i / segs) * WORLD;
            const cx = riverX(z);
            const dz = 0.5;
            const slope = (riverX(z + dz) - riverX(z - dz)) / (2 * dz);
            const len = Math.sqrt(1 + slope * slope);
            const nx = 1 / len;
            const nz = -slope / len;
            verts.push(cx + nx * RIVER_HALF, WATER_Y + 0.02, z + nz * RIVER_HALF);
            verts.push(cx - nx * RIVER_HALF, WATER_Y + 0.02, z - nz * RIVER_HALF);
            uvs.push(0, i / segs * 8);
            uvs.push(1, i / segs * 8);
        }
        for (let i = 0; i < segs; i++) {
            const a = i * 2, b = a + 1, c = a + 2, d = a + 3;
            idx.push(a, b, c, b, d, c);
        }
        const rgeo = new THREE.BufferGeometry();
        rgeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        rgeo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvs, 2));
        rgeo.setIndex(idx);
        rgeo.computeVertexNormals();
        const river = new THREE.Mesh(rgeo, riverMaterial);
        river.renderOrder = 2;
        scene.add(river);
    }

    // ===================================================================
    //  FLORA / PROPS — biome-aware, river-aware placement
    // ===================================================================
    const propRoot = new THREE.Group();
    scene.add(propRoot);

    // shared materials (cheap)
    const M = {
        barkOak:   new THREE.MeshLambertMaterial({ color: 0x4a3320 }),
        barkPine:  new THREE.MeshLambertMaterial({ color: 0x2e1f12 }),
        barkBirch: new THREE.MeshLambertMaterial({ color: 0xd8d2c0 }),
        deadBark:  new THREE.MeshLambertMaterial({ color: 0x3a2f24 }),
        leafOak:   new THREE.MeshLambertMaterial({ color: 0x33561f }),
        leafPine:  new THREE.MeshLambertMaterial({ color: 0x1f3a22 }),
        leafBirch: new THREE.MeshLambertMaterial({ color: 0x6a8a3a }),
        bushA:     new THREE.MeshLambertMaterial({ color: 0x35531f }),
        bushB:     new THREE.MeshLambertMaterial({ color: 0x4a6a2a }),
        rockGrey:  new THREE.MeshLambertMaterial({ color: 0x6b6660, flatShading: true }),
        rockDark:  new THREE.MeshLambertMaterial({ color: 0x4f4a44, flatShading: true }),
        grassA:    new THREE.MeshLambertMaterial({ color: 0x4a6a2a }),
        grassB:    new THREE.MeshLambertMaterial({ color: 0x607a32 }),
        reed:      new THREE.MeshLambertMaterial({ color: 0x6a7a30 }),
        leafOakLight: new THREE.MeshLambertMaterial({ color: 0x4a7a2a }),
        leafOakMid:   new THREE.MeshLambertMaterial({ color: 0x3a6a25 }),
        leafPineLight: new THREE.MeshLambertMaterial({ color: 0x3a5a30 }),
        fungus:    new THREE.MeshLambertMaterial({ color: 0x8a5a20 }),
    };
    function rand(a, b) { return a + Math.random() * (b - a); }

    // Geometry helpers (used by trees, animals, villagers)
    const SP = (r, s = 16) => new THREE.SphereGeometry(r, s, s);
    const CY = (rt, rb, h, s = 10) => new THREE.CylinderGeometry(rt, rb, h, s);

    // ----- tree builders -----
    // Tree scale base — real trees are 15–35 m. Player is 1.65 m.
    const TREE = 2.6;

    // Shared: add exposed roots radiating from trunk base
    function addRoots(g, trunkRadius, s, barkMat) {
        const n = 2 + Math.floor(Math.random() * 2);
        for (let i = 0; i < n; i++) {
            const angle = (i / n) * Math.PI * 2 + rand(-0.3, 0.3);
            const len = trunkRadius * rand(1.2, 1.8);
            const root = new THREE.Mesh(CY(0.04 * s, 0.09 * s, len, 5), barkMat);
            // Start at ground level, angle steeply DOWN so they burrow into the terrain
            root.position.set(Math.cos(angle) * trunkRadius * 0.5, -0.05 * s, Math.sin(angle) * trunkRadius * 0.5);
            root.rotation.z = Math.cos(angle) * -1.1;  // ~63° downward
            root.rotation.x = Math.sin(angle) * 1.1;
            g.add(root);
        }
    }

    // Shared: slight random lean for natural look
    function addLean(g) {
        g.rotation.z = rand(-0.04, 0.04);
        g.rotation.x = rand(-0.04, 0.04);
    }

    const oakLeafMats = [M.leafOak, M.leafOakLight, M.leafOakMid];

    function makeOak(s) {
        s *= TREE;
        const g = new THREE.Group();
        const H = 7 * s;
        const trunkRTop = 0.55 * s, trunkRBot = 0.85 * s;
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(trunkRTop, trunkRBot, H, 8), M.barkOak);
        trunk.position.y = H / 2; trunk.castShadow = true;
        g.add(trunk);
        // Exposed roots
        addRoots(g, trunkRBot, s, M.barkOak);
        // Visible branch structure (2-3 thick branches under canopy)
        const nBranches = 2 + Math.floor(Math.random() * 2);
        for (let i = 0; i < nBranches; i++) {
            const angle = (i / nBranches) * Math.PI * 2 + rand(-0.3, 0.3);
            const bLen = rand(0.7, 1.3) * s;
            const br = new THREE.Mesh(CY(0.05 * s, trunkRTop * 0.3, bLen, 5), M.barkOak);
            const bY = H * rand(0.45, 0.62);
            br.position.set(Math.cos(angle) * bLen * 0.25, bY, Math.sin(angle) * bLen * 0.25);
            br.rotation.z = Math.cos(angle) * rand(0.5, 0.85);
            br.rotation.x = Math.sin(angle) * rand(0.5, 0.85);
            br.castShadow = true;
            g.add(br);
        }
        // Foliage clusters with color variation + wider canopy (single sphere per blob)
        for (let i = 0; i < 5; i++) {
            const cx = rand(-1.6, 1.6) * s, cy = H + rand(-0.5, 2.5) * s, cz = rand(-1.6, 1.6) * s;
            const mat = oakLeafMats[Math.floor(Math.random() * 3)];
            const f = new THREE.Mesh(new THREE.SphereGeometry(rand(2.2, 3.5) * s, 8, 6), mat);
            f.position.set(cx, cy, cz);
            // Wider than tall for spreading oak silhouette
            f.scale.set(rand(1.1, 1.4), rand(0.7, 0.9), rand(1.1, 1.4));
            f.castShadow = true;
            g.add(f);
        }
        addLean(g);
        return g;
    }
    function makePine(s) {
        s *= TREE;
        const g = new THREE.Group();
        const H = 11 * s;
        const trunkRTop = 0.4 * s, trunkRBot = 0.65 * s;
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(trunkRTop, trunkRBot, H, 8), M.barkPine);
        trunk.position.y = H / 2; trunk.castShadow = true;
        g.add(trunk);
        // Exposed roots
        addRoots(g, trunkRBot, s, M.barkPine);
        // Foliage: 6 stacked cones with color gradient + branch structure
        for (let i = 0; i < 6; i++) {
            const r = (3.8 - i * 0.55) * s;
            const coneY = (1.6 + i * 1.7) * s;
            // Color gradient: bottom darker, top lighter
            const t = i / 5; // 0 = bottom, 1 = top
            const coneMat = t < 0.4 ? M.leafPine : (t < 0.7 ? M.leafPineLight : M.leafPineLight);
            const cone = new THREE.Mesh(new THREE.ConeGeometry(r, 3.4 * s, 8), t < 0.5 ? M.leafPine : M.leafPineLight);
            cone.position.y = coneY;
            cone.castShadow = true;
            // Drooping lower cones (bottom 2 layers)
            if (i < 2) {
                cone.rotation.x = rand(-0.08, 0.08);
                cone.rotation.z = rand(-0.08, 0.08);
            }
            g.add(cone);
        }
        addLean(g);
        return g;
    }
    function makeBirch(s) {
        s *= TREE;
        const g = new THREE.Group();
        const H = 9 * s;
        const trunkRTop = 0.3 * s, trunkRBot = 0.4 * s;
        // Multi-trunk variant disabled for performance
        const multiTrunk = false;
        const trunkCount = multiTrunk ? (2 + Math.floor(Math.random() * 2)) : 1; // 2-3 trunks or 1
        for (let t = 0; t < trunkCount; t++) {
            const offsetX = multiTrunk ? rand(-0.5, 0.5) * s : 0;
            const offsetZ = multiTrunk ? rand(-0.5, 0.5) * s : 0;
            const leanX = multiTrunk ? rand(-0.08, 0.08) : 0;
            const leanZ = multiTrunk ? rand(-0.08, 0.08) : 0;
            const tRTop = multiTrunk ? trunkRTop * 0.7 : trunkRTop;
            const tRBot = multiTrunk ? trunkRBot * 0.7 : trunkRBot;
            const tH = multiTrunk ? H * rand(0.8, 1.0) : H;
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(tRTop, tRBot, tH, 8), M.barkBirch);
            trunk.position.set(offsetX, tH / 2, offsetZ);
            trunk.rotation.x = leanX; trunk.rotation.z = leanZ;
            trunk.castShadow = true;
            g.add(trunk);
            // Bark rings (3 dark horizontal marks)
            const nRings = 3;
            for (let r = 0; r < nRings; r++) {
                const ringY = tH * rand(0.15, 0.85);
                const ringR = tRTop + (tRBot - tRTop) * (1 - ringY / tH); // interpolate radius
                const ring = new THREE.Mesh(new THREE.TorusGeometry(ringR * 1.02, 0.008, 4, 16), M.barkPine);
                ring.position.set(offsetX, ringY, offsetZ);
                ring.rotation.x = Math.PI / 2; // horizontal
                g.add(ring);
            }
            // Foliage for this trunk
            const foliageCount = multiTrunk ? 2 : 4;
            for (let i = 0; i < foliageCount; i++) {
                const f = new THREE.Mesh(new THREE.SphereGeometry(rand(1.8, 2.4) * s * (multiTrunk ? 0.7 : 1), 8, 6), M.leafBirch);
                f.position.set(offsetX + rand(-1.1, 1.1) * s * (multiTrunk ? 0.6 : 1), (tH * 0.8 + i * 0.9 * s), offsetZ + rand(-1.1, 1.1) * s * (multiTrunk ? 0.6 : 1));
                f.castShadow = true;
                g.add(f);
            }
        }
        // Exposed roots (from center base)
        addRoots(g, trunkRBot, s, M.barkBirch);
        addLean(g);
        return g;
    }
    function makeDeadTree(s) {
        s *= TREE;
        const g = new THREE.Group();
        const H = 7.2 * s; // slightly shorter to leave room for broken top
        const trunkRTop = 0.32 * s, trunkRBot = 0.55 * s;
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(trunkRTop, trunkRBot, H, 7), M.deadBark);
        trunk.position.y = H / 2; trunk.castShadow = true;
        g.add(trunk);
        // Broken jagged top: tilted cone at the top
        const topCone = new THREE.Mesh(new THREE.ConeGeometry(trunkRTop * 1.3, 1.2 * s, 5), M.deadBark);
        topCone.position.y = H + 0.4 * s;
        topCone.rotation.z = rand(-0.3, 0.3);
        topCone.rotation.x = rand(-0.3, 0.3);
        g.add(topCone);
        // Exposed roots
        addRoots(g, trunkRBot, s, M.deadBark);
        // Dead branches
        for (let i = 0; i < 4; i++) {
            const br = new THREE.Mesh(new THREE.CylinderGeometry(0.08 * s, 0.18 * s, 2.6 * s, 5), M.deadBark);
            br.position.set(rand(-0.4, 0.4) * s, (H * 0.7 + i * 0.6 * s), rand(-0.4, 0.4) * s);
            br.rotation.z = rand(-1.1, 1.1);
            br.rotation.x = rand(-0.6, 0.6);
            br.castShadow = true;
            g.add(br);
        }
        // Fungus shelves (2-4 small half-discs on trunk)
        const nFungus = 2 + Math.floor(Math.random() * 3);
        for (let i = 0; i < nFungus; i++) {
            const fRadius = 0.15 * s;
            const fungus = new THREE.Mesh(new THREE.CylinderGeometry(fRadius, fRadius, 0.02 * s, 8, 1, false, 0, Math.PI), M.fungus);
            const fAngle = rand(0, Math.PI * 2);
            const fY = H * rand(0.2, 0.7);
            const trunkR = trunkRBot + (trunkRTop - trunkRBot) * (fY / H);
            fungus.position.set(Math.cos(fAngle) * trunkR, fY, Math.sin(fAngle) * trunkR);
            fungus.rotation.y = fAngle;
            fungus.rotation.z = Math.PI / 2; // stick out horizontally
            g.add(fungus);
        }
        addLean(g);
        return g;
    }

    function makeBush() {
        const g = new THREE.Group();
        const n = 4 + (Math.random() * 4 | 0);
        for (let i = 0; i < n; i++) {
            const r = rand(0.7, 1.6);
            const s = new THREE.Mesh(new THREE.SphereGeometry(r, 7, 6), Math.random() < 0.5 ? M.bushA : M.bushB);
            s.position.set(rand(-1.2, 1.2), rand(0.4, 1.3), rand(-1.2, 1.2));
            s.castShadow = true;
            g.add(s);
        }
        return g;
    }

    function makeRock() {
        const r = rand(0.9, 4.2);
        const detail = Math.random() < 0.5 ? 0 : 1;
        const m = new THREE.Mesh(
            new THREE.IcosahedronGeometry(r, detail),
            Math.random() < 0.5 ? M.rockGrey : M.rockDark
        );
        m.rotation.set(Math.random() * 6.28, Math.random() * 6.28, Math.random() * 6.28);
        m.castShadow = true;
        return { mesh: m, sink: r * 0.35 };
    }

    function makeGrassTuft() {
        const h = rand(0.6, 1.4);
        const t = new THREE.Mesh(
            new THREE.ConeGeometry(rand(0.25, 0.55), h, 5),
            Math.random() < 0.5 ? M.grassA : M.grassB
        );
        t.position.y = h / 2;
        t.rotation.y = Math.random() * 6.28;
        return t;
    }
    function makeReed() {
        const h = rand(1.2, 2.4);
        const t = new THREE.Mesh(new THREE.ConeGeometry(0.18, h, 5), M.reed);
        t.position.y = h / 2;
        return t;
    }

    // List of choppable trees with their world positions, for hit detection.
    const trees = [];   // { obj, x, z, alive, fall: 0..1 }
    const swaying = []; // foliage groups for wind sway (tree obj + base rotation)

    // ----- placement: rejection-sampled across the world -----
    function place(obj, x, z, sink = 0, tree = false) {
        const y = sampleGroundY(x, z) - sink;
        obj.position.set(x, y, z);
        obj.rotation.y = Math.random() * 6.28;
        propRoot.add(obj);
        if (tree) {
            const t = { obj, x, z, y, sink, alive: true, fall: 0,
                        baseRotX: obj.rotation.x, baseRotZ: obj.rotation.z,
                        seed: Math.random() * 100, radius: 1.6 };
            trees.push(t);
            swaying.push(t);
        }
    }

    // (Prop placement happens AFTER village centers are picked, see below.)

    // ===================================================================
    //  PROCEDURAL VILLAGES — properly built timber-framed houses,
    //  placed only on flat dry plains / meadows, away from forests.
    // ===================================================================
    const houseColliders = [];                  // for player collision
    const villageCenters = [];                  // [{cx,cz,radius}] for tree exclusion
    const VILLAGE_CLEAR = 110;                  // clear-radius around village

    function buildHouse(x, z, rotY, houseType) {
        const g = new THREE.Group();
        // HOLLOW cottage you can walk into. Door is at ground level.
        const w     = rand(11, 13);
        const d     = rand(8, 9.5);
        const wh    = rand(5.5, 6.5);
        const roofH = rand(4.8, 5.8);
        const wallT = 0.32;
        const doorW = 1.6;     // wide enough to walk through comfortably
        const doorH = 2.6;     // tall enough that even crouched you wouldn't bump
        const lintelH = wh - doorH;

        const wallMat   = new THREE.MeshLambertMaterial({ color: 0xd4c098, side: THREE.DoubleSide });
        const beamMat   = new THREE.MeshLambertMaterial({ color: 0x2c1d0e });
        const stoneMat  = new THREE.MeshLambertMaterial({ color: 0x6e655a, flatShading: true });
        const thatchMat = new THREE.MeshLambertMaterial({ color: 0xb8862c, side: THREE.DoubleSide });
        const thatchEdgeMat = new THREE.MeshLambertMaterial({ color: 0x7d5a18 });
        const floorMat  = new THREE.MeshLambertMaterial({ color: 0x6a4a28 });

        // Stone plinth: extends 3 m DOWN below the anchor so that on rolling
        // ground the downhill side never shows daylight under the floor.
        // Top sits at y=0 (so the door is still flush with the entrance).
        const plinthDepth = 2.5;
        const plinth = new THREE.Mesh(
            new THREE.BoxGeometry(w + 0.4, plinthDepth, d + 0.4), stoneMat
        );
        plinth.position.y = -plinthDepth / 2 + 0.1;
        plinth.receiveShadow = true;
        plinth.castShadow = true;
        g.add(plinth);

        // Interior floor
        const floor = new THREE.Mesh(
            new THREE.BoxGeometry(w - 2 * wallT, 0.12, d - 2 * wallT),
            floorMat
        );
        floor.position.y = 0.16;
        floor.receiveShadow = true;
        g.add(floor);

        // === HOLLOW WALLS — 4 separate slabs, front split for the door gap ===
        // Back wall
        const back = new THREE.Mesh(new THREE.BoxGeometry(w, wh, wallT), wallMat);
        back.position.set(0, wh / 2, -d / 2 + wallT / 2);
        back.castShadow = true; back.receiveShadow = true;
        g.add(back);
        // Left wall
        const left = new THREE.Mesh(new THREE.BoxGeometry(wallT, wh, d - 2 * wallT), wallMat);
        left.position.set(-w / 2 + wallT / 2, wh / 2, 0);
        left.castShadow = true; left.receiveShadow = true;
        g.add(left);
        // Right wall
        const right = left.clone();
        right.position.x = w / 2 - wallT / 2;
        g.add(right);
        // Front wall — left of door
        const frontPanelW = (w - doorW) / 2;
        const frontLeft = new THREE.Mesh(
            new THREE.BoxGeometry(frontPanelW, wh, wallT), wallMat
        );
        frontLeft.position.set(-(doorW / 2 + frontPanelW / 2), wh / 2, d / 2 - wallT / 2);
        frontLeft.castShadow = true;
        g.add(frontLeft);
        // Front wall — right of door
        const frontRight = frontLeft.clone();
        frontRight.position.x = doorW / 2 + frontPanelW / 2;
        g.add(frontRight);
        // Front wall — lintel above the door
        if (lintelH > 0) {
            const lintel = new THREE.Mesh(
                new THREE.BoxGeometry(doorW + 0.4, lintelH, wallT), wallMat
            );
            lintel.position.set(0, doorH + lintelH / 2, d / 2 - wallT / 2);
            g.add(lintel);
        }

        // === Timber framing on the long sides (front + back) ===
        const postT = 0.22;
        for (const sx of [-1, 1]) for (const sz of [-1, 1]) {
            const post = new THREE.Mesh(new THREE.BoxGeometry(postT, wh, postT), beamMat);
            post.position.set(sx * (w / 2 - postT / 2), wh / 2, sz * (d / 2 - postT / 2));
            g.add(post);
        }
        for (const sz of [-1, 1]) {
            for (const yFrac of [0.0, 0.5, 1.0]) {
                const h = new THREE.Mesh(new THREE.BoxGeometry(w + 0.02, postT * 0.7, postT * 0.7), beamMat);
                h.position.set(0, wh * yFrac, sz * (d / 2 + 0.005));
                g.add(h);
            }
        }

        // === ROOF (same proven slope formula) ===
        const slopeRun  = d / 2;
        const slopeLen  = Math.sqrt(slopeRun * slopeRun + roofH * roofH);
        const slopeAng  = Math.atan2(roofH, slopeRun);
        const eaveW    = w + 1.2;
        const eaveOver = 0.6;
        const slopeFront = new THREE.Mesh(
            new THREE.BoxGeometry(eaveW, 0.35, slopeLen + eaveOver), thatchMat
        );
        slopeFront.position.set(0, wh + roofH / 2, slopeRun / 2);
        slopeFront.rotation.x = slopeAng;
        slopeFront.castShadow = true;
        g.add(slopeFront);
        const slopeBack = slopeFront.clone();
        slopeBack.position.z = -slopeRun / 2;
        slopeBack.rotation.x = -slopeAng;
        g.add(slopeBack);
        // Ridge cap
        const ridge = new THREE.Mesh(
            new THREE.CylinderGeometry(0.28, 0.28, eaveW + 0.1, 8), thatchEdgeMat
        );
        ridge.rotation.z = Math.PI / 2;
        ridge.position.set(0, wh + roofH, 0);
        g.add(ridge);
        // Triangular gable infill at the +X / -X ends
        const gableShape = new THREE.Shape();
        gableShape.moveTo(-d / 2, 0);
        gableShape.lineTo( d / 2, 0);
        gableShape.lineTo(0, roofH);
        gableShape.closePath();
        const gableGeo = new THREE.ExtrudeGeometry(gableShape, { depth: 0.18, bevelEnabled: false });
        const gable1 = new THREE.Mesh(gableGeo, wallMat);
        gable1.rotation.y = Math.PI / 2;
        gable1.position.set(w / 2 - 0.05, wh, 0);
        g.add(gable1);
        const gable2 = new THREE.Mesh(gableGeo, wallMat);
        gable2.rotation.y = -Math.PI / 2;
        gable2.position.set(-w / 2 + 0.05, wh, 0);
        g.add(gable2);

        // === DOOR (hinged, ground level, animatable) ===
        const doorPivot = new THREE.Group();
        // Hinge on the player-left side of the door, sitting on the front wall
        doorPivot.position.set(-doorW / 2, 0, d / 2 - wallT / 2 + 0.04);
        const doorMesh = new THREE.Mesh(
            new THREE.BoxGeometry(doorW, doorH, 0.10),
            new THREE.MeshLambertMaterial({ color: 0x4a2e14 })
        );
        // Place door so its left edge sits at the pivot
        doorMesh.position.set(doorW / 2, doorH / 2, 0.05);
        doorMesh.castShadow = true;
        doorPivot.add(doorMesh);
        // Door handle
        const handle = new THREE.Mesh(
            new THREE.SphereGeometry(0.08, 6, 5),
            new THREE.MeshLambertMaterial({ color: 0x2a2218 })
        );
        handle.position.set(doorW - 0.18, doorH * 0.5, 0.12);
        doorPivot.add(handle);
        g.add(doorPivot);
        // Door frame trim
        const frameMat = beamMat;
        const frameSide = new THREE.Mesh(new THREE.BoxGeometry(0.1, doorH + 0.2, 0.18), frameMat);
        frameSide.position.set(-doorW / 2 - 0.05, (doorH + 0.2) / 2, d / 2 - wallT / 2 + 0.1);
        g.add(frameSide);
        const frameSide2 = frameSide.clone();
        frameSide2.position.x = doorW / 2 + 0.18;
        g.add(frameSide2);
        const frameTop = new THREE.Mesh(new THREE.BoxGeometry(doorW + 0.3, 0.1, 0.18), frameMat);
        frameTop.position.set(0, doorH + 0.15, d / 2 - wallT / 2 + 0.1);
        g.add(frameTop);

        // === WINDOWS with shutters and crossbar mullion (front facade only) ===
        const winMat = new THREE.MeshLambertMaterial({ color: 0x1a1410 });
        const shutterMat = new THREE.MeshLambertMaterial({ color: 0x4a2c14 });
        for (const sx of [-w * 0.34, w * 0.34]) {
            const winW = 1.1, winH = 1.1;
            const win = new THREE.Mesh(new THREE.BoxGeometry(winW, winH, 0.1), winMat);
            win.position.set(sx, wh * 0.62, d / 2 - wallT / 2 + 0.05);
            g.add(win);
            const horiz = new THREE.Mesh(new THREE.BoxGeometry(winW, 0.08, 0.14), beamMat);
            horiz.position.set(sx, wh * 0.62, d / 2 - wallT / 2 + 0.10);
            g.add(horiz);
            const vert = new THREE.Mesh(new THREE.BoxGeometry(0.08, winH, 0.14), beamMat);
            vert.position.set(sx, wh * 0.62, d / 2 - wallT / 2 + 0.10);
            g.add(vert);
            for (const ss of [-1, 1]) {
                const sh = new THREE.Mesh(
                    new THREE.BoxGeometry(winW * 0.55, winH * 1.05, 0.06), shutterMat
                );
                sh.position.set(sx + ss * (winW * 0.78), wh * 0.62, d / 2 - wallT / 2 + 0.12);
                g.add(sh);
            }
        }

        // === CHIMNEY ===
        const chimW = 1.0;
        const chimH = wh + roofH + 0.8;
        const chim = new THREE.Mesh(new THREE.BoxGeometry(chimW, chimH, chimW), stoneMat);
        chim.position.set(w * 0.42, chimH / 2, 0);
        chim.castShadow = true;
        g.add(chim);
        const chimCap = new THREE.Mesh(
            new THREE.BoxGeometry(chimW + 0.25, 0.18, chimW + 0.25), stoneMat
        );
        chimCap.position.set(w * 0.42, chimH + 0.09, 0);
        g.add(chimCap);

        // === Shared materials for exterior + interior ===
        const iWood   = new THREE.MeshLambertMaterial({ color: 0x5a3818 });
        const iWoodDk = new THREE.MeshLambertMaterial({ color: 0x3a2210 });
        const iStone  = new THREE.MeshLambertMaterial({ color: 0x5a5550, flatShading: true });
        const iIron   = new THREE.MeshLambertMaterial({ color: 0x3a3a3a });

        // === TYPE-SPECIFIC EXTERIOR ===
        if (houseType === 'blacksmith') {
            // Open-sided forge lean-to on the right wall
            const forgePost1 = new THREE.Mesh(CY(0.12, 0.12, wh*0.7, 6), iWoodDk);
            forgePost1.position.set(w/2 + 1.5, wh*0.35, -d*0.25);
            g.add(forgePost1);
            const forgePost2 = forgePost1.clone();
            forgePost2.position.z = d*0.25;
            g.add(forgePost2);
            const forgeRoof = new THREE.Mesh(new THREE.BoxGeometry(3.0, 0.2, d*0.6), thatchMat);
            forgeRoof.position.set(w/2 + 1.5, wh*0.7, 0);
            g.add(forgeRoof);
            // Anvil
            const anvil = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.3), iIron);
            anvil.position.set(w/2 + 1.5, 0.5, 0);
            g.add(anvil);
            const anvilTop = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.08, 0.35), iIron);
            anvilTop.position.set(w/2 + 1.5, 0.72, 0);
            g.add(anvilTop);
        } else if (houseType === 'farmer') {
            // Fence pen on the side
            const fenceMat = new THREE.MeshLambertMaterial({color: 0x5a3818});
            for (let fi = 0; fi < 8; fi++) {
                const post = new THREE.Mesh(CY(0.06, 0.06, 1.2, 6), fenceMat);
                const fx = w/2 + 2 + (fi % 4) * 1.8;
                const fz = fi < 4 ? -d*0.3 : d*0.3;
                post.position.set(fx, 0.6, fz);
                g.add(post);
            }
            // Horizontal rails
            for (const rz of [-d*0.3, d*0.3]) {
                const rail = new THREE.Mesh(new THREE.BoxGeometry(7, 0.06, 0.06), fenceMat);
                rail.position.set(w/2 + 5, 0.9, rz);
                g.add(rail);
                const rail2 = rail.clone();
                rail2.position.y = 0.4;
                g.add(rail2);
            }
            // Hay bales
            for (let hi = 0; hi < 2; hi++) {
                const hay = new THREE.Mesh(CY(0.4, 0.4, 0.6, 12), new THREE.MeshLambertMaterial({color: 0xb8a060}));
                hay.rotation.x = Math.PI/2;
                hay.position.set(-w/2 - 1.2, 0.4, rand(-d*0.2, d*0.2));
                g.add(hay);
            }

            // === CROP GARDEN — tilled patch with rows of growing crops ===
            // Placed behind the house (opposite the door, -Z side in local frame)
            const gardenOffZ = -d/2 - 6;     // 6m behind the house
            const gardenW = 12, gardenD = 10;
            const dirtMat = new THREE.MeshLambertMaterial({ color: 0x5a3a18, side: THREE.DoubleSide });
            const tilledMat = new THREE.MeshLambertMaterial({ color: 0x4a2e14, side: THREE.DoubleSide });

            // Tilled dirt patch (flat plane on the ground)
            const dirtPatch = new THREE.Mesh(
                new THREE.PlaneGeometry(gardenW, gardenD), dirtMat
            );
            dirtPatch.rotation.x = -Math.PI / 2;
            dirtPatch.position.set(0, 0.06, gardenOffZ);
            g.add(dirtPatch);

            // Tilled furrow lines (darker rows running along X)
            const nRows = 6;
            const rowSpacing = gardenD / (nRows + 1);
            for (let ri = 0; ri < nRows; ri++) {
                const rowZ = gardenOffZ - gardenD/2 + (ri + 1) * rowSpacing;
                const furrow = new THREE.Mesh(
                    new THREE.BoxGeometry(gardenW - 0.8, 0.04, 0.35), tilledMat
                );
                furrow.position.set(0, 0.08, rowZ);
                g.add(furrow);

                // Crop type per row (cycling through wheat, carrots, cabbages, potatoes, turnips, herbs)
                const cropType = ri % 6;
                const nCrops = 6 + Math.floor(Math.random() * 4);
                const cropSpacing = (gardenW - 1.5) / nCrops;

                for (let ci = 0; ci < nCrops; ci++) {
                    const cx = -gardenW/2 + 0.75 + ci * cropSpacing + rand(-0.15, 0.15);
                    const cz = rowZ + rand(-0.1, 0.1);
                    const growthStage = rand(0.6, 1.0); // maturity variation

                    if (cropType === 0) {
                        // WHEAT — tall golden stalks with seed head
                        const stalkH = 0.7 * growthStage;
                        const stalk = new THREE.Mesh(CY(0.008, 0.012, stalkH, 4),
                            new THREE.MeshLambertMaterial({ color: 0x9a8a30 }));
                        stalk.position.set(cx, stalkH/2 + 0.08, cz);
                        g.add(stalk);
                        // Wheat head (small elongated sphere)
                        const head = new THREE.Mesh(SP(0.025),
                            new THREE.MeshLambertMaterial({ color: 0xc8a840 }));
                        head.scale.set(0.6, 1.8, 0.6);
                        head.position.set(cx, stalkH + 0.1, cz);
                        g.add(head);
                    } else if (cropType === 1) {
                        // CARROTS — green feathery tops, orange root peeking out
                        const topH = 0.35 * growthStage;
                        for (let li = 0; li < 3; li++) {
                            const leaf = new THREE.Mesh(CY(0.003, 0.015, topH, 4),
                                new THREE.MeshLambertMaterial({ color: 0x3a7a2a }));
                            leaf.position.set(cx + rand(-0.04, 0.04), topH/2 + 0.08, cz + rand(-0.04, 0.04));
                            leaf.rotation.z = rand(-0.2, 0.2);
                            g.add(leaf);
                        }
                        // Orange root tip at ground
                        const root = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.08, 5),
                            new THREE.MeshLambertMaterial({ color: 0xe07020 }));
                        root.rotation.x = Math.PI;  // point down
                        root.position.set(cx, 0.06, cz);
                        g.add(root);
                    } else if (cropType === 2) {
                        // CABBAGES — round green heads on the ground
                        const cabbageR = 0.12 * growthStage;
                        const cabbage = new THREE.Mesh(SP(cabbageR, 10),
                            new THREE.MeshLambertMaterial({ color: 0x4a8a30 }));
                        cabbage.scale.set(1.0, 0.7, 1.0);
                        cabbage.position.set(cx, cabbageR * 0.5 + 0.08, cz);
                        g.add(cabbage);
                        // Outer leaves
                        for (let ol = 0; ol < 3; ol++) {
                            const leaf = new THREE.Mesh(SP(cabbageR * 0.7, 6),
                                new THREE.MeshLambertMaterial({ color: 0x5a9a3a }));
                            const la = (ol / 3) * Math.PI * 2;
                            leaf.scale.set(1.2, 0.3, 0.8);
                            leaf.position.set(cx + Math.cos(la) * cabbageR * 0.7, 0.1, cz + Math.sin(la) * cabbageR * 0.7);
                            g.add(leaf);
                        }
                    } else if (cropType === 3) {
                        // POTATOES — small mounds of dirt with green plant on top
                        const mound = new THREE.Mesh(SP(0.08, 6),
                            new THREE.MeshLambertMaterial({ color: 0x5a3a18 }));
                        mound.scale.set(1.2, 0.5, 1.0);
                        mound.position.set(cx, 0.1, cz);
                        g.add(mound);
                        const plant = new THREE.Mesh(SP(0.06, 6),
                            new THREE.MeshLambertMaterial({ color: 0x3a6a20 }));
                        plant.position.set(cx, 0.22 * growthStage, cz);
                        g.add(plant);
                    } else if (cropType === 4) {
                        // TURNIPS — purple-white root peeking out with green top
                        const turnipR = 0.05 * growthStage;
                        const turnip = new THREE.Mesh(SP(turnipR + 0.02, 8),
                            new THREE.MeshLambertMaterial({ color: 0x8a4a8a }));
                        turnip.scale.set(1.0, 0.8, 1.0);
                        turnip.position.set(cx, 0.08, cz);
                        g.add(turnip);
                        const tTop = new THREE.Mesh(CY(0.005, 0.018, 0.2 * growthStage, 4),
                            new THREE.MeshLambertMaterial({ color: 0x4a8a2a }));
                        tTop.position.set(cx, 0.15 * growthStage, cz);
                        g.add(tTop);
                    } else {
                        // HERBS — small bushy green clusters
                        const herb = new THREE.Mesh(SP(0.06 * growthStage, 6),
                            new THREE.MeshLambertMaterial({ color: [0x3a6a20, 0x5a7a30, 0x2a5a18][ci % 3] }));
                        herb.scale.set(1.2, 0.8, 1.0);
                        herb.position.set(cx, 0.06 * growthStage + 0.08, cz);
                        g.add(herb);
                    }
                }
            }

            // Garden fence (simple posts + rails around the patch)
            const gFenceMat = fenceMat;
            const gCorners = [
                [-gardenW/2, gardenOffZ - gardenD/2],
                [ gardenW/2, gardenOffZ - gardenD/2],
                [ gardenW/2, gardenOffZ + gardenD/2],
                [-gardenW/2, gardenOffZ + gardenD/2],
            ];
            for (let gi = 0; gi < 4; gi++) {
                const [gx1, gz1] = gCorners[gi];
                const [gx2, gz2] = gCorners[(gi + 1) % 4];
                // Corner post
                const gpost = new THREE.Mesh(CY(0.04, 0.04, 0.8, 5), gFenceMat);
                gpost.position.set(gx1, 0.4, gz1);
                g.add(gpost);
                // Rail between corners
                const gLen = Math.hypot(gx2 - gx1, gz2 - gz1);
                const gAng = Math.atan2(gx2 - gx1, gz2 - gz1);
                const grail = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, gLen), gFenceMat);
                grail.position.set((gx1 + gx2)/2, 0.65, (gz1 + gz2)/2);
                grail.rotation.y = gAng;
                g.add(grail);
                const grail2 = grail.clone();
                grail2.position.y = 0.35;
                g.add(grail2);
            }

        } else if (houseType === 'baker') {
            // Stone oven dome on the side
            const ovenMat = new THREE.MeshLambertMaterial({color: 0x6a6258, flatShading: true});
            const oven = new THREE.Mesh(SP(0.9), ovenMat);
            oven.scale.set(1.2, 0.8, 1.0);
            oven.position.set(-w/2 - 1.2, 0.7, 0);
            g.add(oven);
            // Oven opening
            const ovenHole = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.3), new THREE.MeshLambertMaterial({color:0x0a0a0a}));
            ovenHole.position.set(-w/2 - 0.5, 0.5, 0);
            g.add(ovenHole);
            // Chimney pipe on oven
            const pipe = new THREE.Mesh(CY(0.15, 0.15, 1.5, 8), ovenMat);
            pipe.position.set(-w/2 - 1.2, 1.7, 0);
            g.add(pipe);
        } else if (houseType === 'chief') {
            // Banners on the front
            const bannerMat = new THREE.MeshLambertMaterial({color: 0x8a2020, side: THREE.DoubleSide});
            for (const bx of [-w*0.3, w*0.3]) {
                const pole = new THREE.Mesh(CY(0.04, 0.04, 3, 6), iWoodDk);
                pole.position.set(bx, wh/2 + 1.5, d/2 + 0.3);
                g.add(pole);
                const banner = new THREE.Mesh(new THREE.PlaneGeometry(0.6, 1.4), bannerMat);
                banner.position.set(bx + 0.35, wh/2 + 2.0, d/2 + 0.3);
                g.add(banner);
            }
            // Stone steps at door
            const stepMat = stoneMat;
            for (let si = 0; si < 2; si++) {
                const step = new THREE.Mesh(new THREE.BoxGeometry(doorW + 0.8, 0.15, 0.5), stepMat);
                step.position.set(0, 0.08 + si * 0.15, d/2 + 0.3 + si * 0.5);
                g.add(step);
            }
        } else if (houseType === 'librarian') {
            // Cross on the gable
            const crossMat = new THREE.MeshLambertMaterial({color: 0x4a3020});
            const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.8, 0.1), crossMat);
            crossV.position.set(0, wh + roofH + 0.5, 0);
            g.add(crossV);
            const crossH = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.1), crossMat);
            crossH.position.set(0, wh + roofH + 0.7, 0);
            g.add(crossH);
        } else if (houseType === 'guard') {
            // Weapon rack outside
            const rackMat = new THREE.MeshLambertMaterial({color: 0x4a2f18});
            const rack = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.4, 1.2), rackMat);
            rack.position.set(w/2 + 0.5, 0.7, d*0.2);
            g.add(rack);
            // Swords on rack
            for (let si = 0; si < 3; si++) {
                const sw = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.8, 0.04), new THREE.MeshLambertMaterial({color:0xaaaaaa}));
                sw.position.set(w/2 + 0.55, 0.9, d*0.2 + (si-1)*0.35);
                sw.rotation.z = 0.15;
                g.add(sw);
            }
            // Training dummy
            const dummyPost = new THREE.Mesh(CY(0.06, 0.06, 1.6, 6), rackMat);
            dummyPost.position.set(w/2 + 3, 0.8, -d*0.2);
            g.add(dummyPost);
            const dummyArm = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.08, 0.08), rackMat);
            dummyArm.position.set(w/2 + 3, 1.3, -d*0.2);
            g.add(dummyArm);
        }

        // === MEDIEVAL INTERIOR (randomized, properly sized + positioned) ===
        // All y-coords use F = 0.18 (floor level above group origin)
        const F = 0.18;
        const iStraw  = new THREE.MeshLambertMaterial({ color: 0xb8a060 });
        const iLinen  = new THREE.MeshLambertMaterial({ color: 0xc8bca0 });
        const iHide   = new THREE.MeshLambertMaterial({ color: 0x6a4a2a });
        const iWhite  = new THREE.MeshLambertMaterial({ color: 0xe8e0d0 });
        const iTan    = new THREE.MeshLambertMaterial({ color: 0xb89868 });
        const iRed    = new THREE.MeshLambertMaterial({ color: 0x8a2020 });
        const iGold   = new THREE.MeshLambertMaterial({ color: 0xd4af37 });
        const iEmber  = new THREE.MeshBasicMaterial({ color: 0xff4400 });
        const iGreen  = new THREE.MeshLambertMaterial({ color: 0x4a8a3a });
        const iBlack  = new THREE.MeshLambertMaterial({ color: 0x080808 });
        // Interior half-dims (for safe positioning inside walls)
        const iw = w / 2 - wallT - 0.6;  // safe x range: [-iw, +iw]
        const id = d / 2 - wallT - 0.6;  // safe z range: [-id, +id]

        if (!houseType) {
        // --- Default randomized interior (no type assigned) ---

        // Fireplace — always, centered on back wall (the wall at -Z)
        {
            const fpW = 1.4, fpH = 1.3, fpD = 0.6;
            const fpZ = -id + fpD / 2;
            const fp = new THREE.Mesh(new THREE.BoxGeometry(fpW, fpH, fpD), iStone);
            fp.position.set(0, F + fpH / 2, fpZ); g.add(fp);
            const hole = new THREE.Mesh(new THREE.BoxGeometry(fpW * 0.55, fpH * 0.6, fpD + 0.1),
                new THREE.MeshLambertMaterial({ color: 0x080808 }));
            hole.position.set(0, F + fpH * 0.28, fpZ + 0.05); g.add(hole);
            // Mantle beam
            const mantle = new THREE.Mesh(new THREE.BoxGeometry(fpW + 0.3, 0.1, fpD + 0.12), iWood);
            mantle.position.set(0, F + fpH + 0.05, fpZ); g.add(mantle);
            // Iron pot hanging in the fireplace
            const pot = new THREE.Mesh(new THREE.SphereGeometry(0.18, 10, 8), iIron);
            pot.scale.set(1, 0.7, 1);
            pot.position.set(0, F + 0.22, fpZ + 0.15); g.add(pot);
            const hook = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.012, 0.5, 5), iIron);
            hook.position.set(0, F + fpH * 0.5, fpZ + 0.15); g.add(hook);
        }

        // Rough-hewn trestle table + benches — 80%
        if (Math.random() < 0.8) {
            const tX = rand(-iw * 0.3, iw * 0.3);
            const tZ = rand(-id * 0.15, id * 0.25);
            const tw = 1.6, td = 0.8, th = 0.72;
            // Top plank
            const top = new THREE.Mesh(new THREE.BoxGeometry(tw, 0.07, td), iWood);
            top.position.set(tX, F + th, tZ); g.add(top);
            // Trestle legs (X-frame)
            for (const tx of [-1, 1]) {
                const leg = new THREE.Mesh(new THREE.BoxGeometry(0.08, th, td * 0.8), iWoodDk);
                leg.position.set(tX + tx * (tw / 2 - 0.12), F + th / 2, tZ); g.add(leg);
                const brace = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, td * 0.6), iWoodDk);
                brace.position.set(tX + tx * (tw / 2 - 0.12), F + th * 0.3, tZ); g.add(brace);
            }
            // Two benches (one each side)
            for (const bz of [-1, 1]) {
                const bench = new THREE.Mesh(new THREE.BoxGeometry(tw * 0.85, 0.06, 0.28), iWood);
                bench.position.set(tX, F + 0.42, tZ + bz * (td / 2 + 0.3)); g.add(bench);
                for (const bx of [-1, 1]) {
                    const bleg = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.42, 0.06), iWoodDk);
                    bleg.position.set(tX + bx * (tw * 0.35), F + 0.21, tZ + bz * (td / 2 + 0.3));
                    g.add(bleg);
                }
            }
            // Pottery on table
            for (let pi = 0; pi < 2; pi++) {
                const mug = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.04, 0.1, 8),
                    new THREE.MeshLambertMaterial({ color: 0x8a6a40 }));
                mug.position.set(tX + rand(-0.4, 0.4), F + th + 0.09, tZ + rand(-0.2, 0.2));
                g.add(mug);
            }
        }

        // Straw bed against a side wall — 90%
        if (Math.random() < 0.9) {
            const side = Math.random() < 0.5 ? -1 : 1;
            const bX = side * (iw - 0.55);
            const bZ = rand(-id * 0.4, -id * 0.05); // toward back, away from door
            // Low wooden frame
            const frame = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.28, 1.9), iWoodDk);
            frame.position.set(bX, F + 0.14, bZ); g.add(frame);
            // Straw mattress (yellowish, lumpy-looking)
            const matt = new THREE.Mesh(new THREE.BoxGeometry(0.95, 0.12, 1.75), iStraw);
            matt.position.set(bX, F + 0.34, bZ); g.add(matt);
            // Rough linen pillow
            const pill = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.09, 0.28), iLinen);
            pill.position.set(bX, F + 0.44, bZ - 0.65); g.add(pill);
            // Blanket / animal hide draped over the end
            const blanket = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.04, 0.7), iHide);
            blanket.position.set(bX, F + 0.40, bZ + 0.5); g.add(blanket);
        }

        // Barrel(s) in a corner — 60%
        if (Math.random() < 0.6) {
            const nBarrels = 1 + (Math.random() * 2 | 0);
            const bSide = Math.random() < 0.5 ? -1 : 1;
            for (let bi = 0; bi < nBarrels; bi++) {
                const bx = bSide * (iw - 0.25 - bi * 0.55);
                const bz = id - 0.4;  // near front wall, away from fireplace
                const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.22, 0.6, 12), iWood);
                barrel.position.set(bx, F + 0.3, bz); g.add(barrel);
                for (const by of [-0.15, 0.15]) {
                    const band = new THREE.Mesh(new THREE.TorusGeometry(0.24, 0.012, 6, 16), iIron);
                    band.rotation.x = Math.PI / 2;
                    band.position.set(bx, F + 0.3 + by, bz); g.add(band);
                }
            }
        }

        // Wall shelf with clay pots — 70%
        if (Math.random() < 0.7) {
            const sSide = Math.random() < 0.5 ? -1 : 1;
            const sY = F + rand(1.4, 1.8);
            const sZ = rand(-id * 0.3, id * 0.2);
            const shelf = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.05, 1.2), iWood);
            shelf.position.set(sSide * (iw + 0.05), sY, sZ); g.add(shelf);
            // Iron brackets
            for (const bz of [-0.4, 0.4]) {
                const brk = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.12, 0.04), iIron);
                brk.position.set(sSide * (iw + 0.02), sY - 0.08, sZ + bz); g.add(brk);
            }
            // Items
            for (let si = 0; si < 3; si++) {
                const jar = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, 0.04, rand(0.10, 0.18), 8),
                    new THREE.MeshLambertMaterial({ color: [0x8a6a38, 0x706050, 0x5a4a3a][si] })
                );
                jar.position.set(sSide * (iw + 0.05), sY + 0.08, sZ + (si - 1) * 0.32);
                g.add(jar);
            }
        }

        // Woven rush mat on the floor — 50%
        if (Math.random() < 0.5) {
            const mat = new THREE.Mesh(
                new THREE.PlaneGeometry(rand(1.4, 2.0), rand(1.0, 1.5)),
                new THREE.MeshLambertMaterial({ color: 0x8a7a48, side: THREE.DoubleSide })
            );
            mat.rotation.x = -Math.PI / 2;
            mat.position.set(rand(-iw * 0.2, iw * 0.2), F + 0.01, rand(-id * 0.1, id * 0.15));
            g.add(mat);
        }

        // Candle holder on wall — 80%
        if (Math.random() < 0.8) {
            for (const sz of [-1, 1]) {
                if (Math.random() < 0.4) continue;
                const cy = F + rand(1.6, 2.2);
                const bracket = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.04, 0.04), iIron);
                bracket.position.set(sz * (iw + 0.05), cy, rand(-id * 0.3, id * 0.3));
                g.add(bracket);
                const candle = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.12, 6),
                    new THREE.MeshLambertMaterial({ color: 0xe8d8a0 }));
                candle.position.set(bracket.position.x - sz * 0.08, cy + 0.08, bracket.position.z);
                g.add(candle);
                // Tiny flame
                const flame = new THREE.Mesh(new THREE.ConeGeometry(0.015, 0.04, 5),
                    new THREE.MeshBasicMaterial({ color: 0xffa020 }));
                flame.position.set(candle.position.x, cy + 0.16, bracket.position.z);
                g.add(flame);
            }
        }

        } else {
        // === TYPE-SPECIFIC INTERIORS ===
        switch (houseType) {
        case 'blacksmith': {
            // Stone forge against back wall (larger than fireplace, with glowing ember)
            const fgW = 2.0, fgH = 1.6, fgD = 0.8;
            const fgZ = -id + fgD / 2;
            const forge = new THREE.Mesh(new THREE.BoxGeometry(fgW, fgH, fgD), iStone);
            forge.position.set(0, F + fgH / 2, fgZ); g.add(forge);
            const fgHole = new THREE.Mesh(new THREE.BoxGeometry(fgW * 0.5, fgH * 0.5, fgD + 0.1), iBlack);
            fgHole.position.set(0, F + fgH * 0.3, fgZ + 0.05); g.add(fgHole);
            const ember = new THREE.Mesh(new THREE.BoxGeometry(fgW * 0.35, 0.1, fgD * 0.4), iEmber);
            ember.position.set(0, F + 0.15, fgZ + 0.1); g.add(ember);
            const fgMantle = new THREE.Mesh(new THREE.BoxGeometry(fgW + 0.3, 0.12, fgD + 0.12), iWood);
            fgMantle.position.set(0, F + fgH + 0.06, fgZ); g.add(fgMantle);

            // Anvil on a stump, center-left
            const stump = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.28, 0.5, 10), iWoodDk);
            stump.position.set(-iw * 0.4, F + 0.25, 0); g.add(stump);
            const anvil = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.18, 0.25),
                new THREE.MeshLambertMaterial({ color: 0x2a2a2a }));
            anvil.position.set(-iw * 0.4, F + 0.59, 0); g.add(anvil);

            // Weapon rack on side wall (vertical board + 3 tilted swords)
            const rack = new THREE.Mesh(new THREE.BoxGeometry(0.08, 1.4, 1.0), iWoodDk);
            rack.position.set(iw, F + 1.0, 0); g.add(rack);
            for (let si = 0; si < 3; si++) {
                const sw = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.7, 0.04), iIron);
                sw.position.set(iw - 0.15, F + 1.1, -0.3 + si * 0.3);
                sw.rotation.z = 0.3;
                g.add(sw);
            }

            // Water trough (open box)
            const troughOuter = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.4, 0.5), iWoodDk);
            troughOuter.position.set(iw * 0.5, F + 0.2, id * 0.5); g.add(troughOuter);
            const troughInner = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.35, 0.35),
                new THREE.MeshLambertMaterial({ color: 0x16323a }));
            troughInner.position.set(iw * 0.5, F + 0.25, id * 0.5); g.add(troughInner);

            // Coal pile (cluster of dark spheres)
            for (let ci = 0; ci < 6; ci++) {
                const coal = new THREE.Mesh(new THREE.SphereGeometry(rand(0.06, 0.1), 6, 5),
                    new THREE.MeshLambertMaterial({ color: 0x1a1a1a }));
                coal.position.set(rand(-0.3, 0.3), F + rand(0.02, 0.1), fgZ + fgD + rand(0.2, 0.6));
                g.add(coal);
            }

            // Iron ingot stack
            for (let ii = 0; ii < 4; ii++) {
                const ingot = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.06, 0.08), iIron);
                ingot.position.set(-iw * 0.7, F + 0.03 + ii * 0.065, -id * 0.4 + rand(-0.05, 0.05));
                g.add(ingot);
            }
            break;
        }
        case 'farmer': {
            // Simple hearth (smaller fireplace)
            const hW = 1.0, hH = 1.0, hD = 0.5;
            const hZ = -id + hD / 2;
            const hearth = new THREE.Mesh(new THREE.BoxGeometry(hW, hH, hD), iStone);
            hearth.position.set(0, F + hH / 2, hZ); g.add(hearth);
            const hHole = new THREE.Mesh(new THREE.BoxGeometry(hW * 0.5, hH * 0.5, hD + 0.1), iBlack);
            hHole.position.set(0, F + hH * 0.25, hZ + 0.05); g.add(hHole);

            // Grain sacks (tan cylinders with rounded tops)
            for (let si = 0; si < 4; si++) {
                const sack = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.5, 8), iTan);
                sack.position.set(-iw * 0.6 + si * 0.5, F + 0.25, -id * 0.3);
                g.add(sack);
                const sackTop = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 6), iTan);
                sackTop.scale.y = 0.4;
                sackTop.position.set(-iw * 0.6 + si * 0.5, F + 0.5, -id * 0.3);
                g.add(sackTop);
            }

            // Pitchfork leaning against wall
            const pfHandle = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 1.6, 6), iWoodDk);
            pfHandle.position.set(iw - 0.1, F + 0.8, -id * 0.5);
            pfHandle.rotation.z = 0.15;
            g.add(pfHandle);
            for (let ti = 0; ti < 3; ti++) {
                const tine = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.25, 4), iIron);
                tine.position.set(iw - 0.18, F + 1.6, -id * 0.5 + (ti - 1) * 0.04);
