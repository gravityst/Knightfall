    // Low-poly material override: strip PBR textures, use flat colored Lambert
    // based on material name hints — matches the game's stylized aesthetic.
    function lowPolyMatForName(name) {
        const n = (name || '').toLowerCase();
        let color = 0xaaa090;
        if (n.includes('plaster')) color = 0xe5d8b8;          // cream plaster
        else if (n.includes('red') && n.includes('brick')) color = 0xa84b3a;
        else if (n.includes('uneven') && n.includes('brick')) color = 0xa67e5b;  // tan brick
        else if (n.includes('brick')) color = 0xb68764;
        else if (n.includes('wood') && n.includes('dark')) color = 0x3a2515;
        else if (n.includes('wood')) color = 0x6b3f20;         // warm brown wood
        else if (n.includes('tile') || n.includes('round')) color = 0x8b3e2a;  // tile roof
        else if (n.includes('metal')) color = 0x45443e;        // dark metal
        else if (n.includes('vine') || n.includes('leaf')) color = 0x345020;
        else if (n.includes('rock') || n.includes('stone')) color = 0x6a655a;
        else if (n.includes('wear') || n.includes('brushed')) color = 0x988060;
        return new THREE.MeshLambertMaterial({ color, flatShading: true });
    }

    function applyLowPoly(scene) {
        scene.traverse(c => {
            if (!c.isMesh) return;
            if (Array.isArray(c.material)) {
                c.material = c.material.map(m => { const nm = lowPolyMatForName(m && m.name); nm.name = m && m.name; return nm; });
            } else {
                const old = c.material;
                c.material = lowPolyMatForName(old && old.name);
                c.material.name = old && old.name;
            }
            c.castShadow = true;
            c.receiveShadow = true;
        });
    }

    // Clone a village prop with shadow casting + low-poly materials applied
    function makeVillageProp(name, scale) {
        const src = villageProps[name];
        if (!src) return null;
        const clone = src.clone(true);
        applyLowPoly(clone);
        if (scale) clone.scale.setScalar(scale);
        return clone;
    }

    // ----- Kit house builder -----
    // Assembles a walled cottage from 2m-grid wall pieces + corners + roof + door.
    // wCells/dCells: number of 2m wall segments per side (e.g. 3x2 = 6m x 4m house)
    // style: 'plaster' or 'brick'
    function buildKitHouse(x, z, rotY, wCells, dCells, style) {
        const g = new THREE.Group();
        const W = wCells * 2;
        const D = dCells * 2;
        const WALL_H = 3.12;  // measured wall height

        const wallSimple = style === 'brick' ? 'Wall_UnevenBrick_Straight' : 'Wall_Plaster_Straight';
        const wallDoor   = style === 'brick' ? 'Wall_UnevenBrick_Door_Flat' : 'Wall_Plaster_Door_Flat';
        const wallWin    = style === 'brick' ? 'Wall_UnevenBrick_Window_Wide_Flat' : 'Wall_Plaster_Window_Wide_Flat';
        const corner     = style === 'brick' ? 'Corner_Exterior_Brick' : 'Corner_Exterior_Wood';

        // --- Floor (2m grid) ---
        for (let ix = 0; ix < wCells; ix++) {
            for (let iz = 0; iz < dCells; iz++) {
                const fl = makeVillageProp('Floor_Brick', 1.0);
                if (!fl) continue;
                const fx = -W/2 + 1 + ix * 2;
                const fz = -D/2 + 1 + iz * 2;
                fl.position.set(fx, 0, fz);
                g.add(fl);
            }
        }

        // --- Walls ---
        const doorCellIdx = Math.floor(wCells / 2);  // front wall door in middle

        // Front (+Z): one door, others plain or window
        for (let i = 0; i < wCells; i++) {
            let name;
            if (i === doorCellIdx) name = wallDoor;
            else if (Math.random() < 0.4) name = wallWin;
            else name = wallSimple;
            const w = makeVillageProp(name, 1.0);
            if (!w) continue;
            w.position.set(-W/2 + 1 + i * 2, 0, D/2);
            g.add(w);
        }
        // Back (-Z): plain or window
        for (let i = 0; i < wCells; i++) {
            const name = Math.random() < 0.35 ? wallWin : wallSimple;
            const w = makeVillageProp(name, 1.0);
            if (!w) continue;
            w.position.set(-W/2 + 1 + i * 2, 0, -D/2);
            w.rotation.y = Math.PI;
            g.add(w);
        }
        // Left (-X): plain or window, rotated
        for (let i = 0; i < dCells; i++) {
            const name = Math.random() < 0.3 ? wallWin : wallSimple;
            const w = makeVillageProp(name, 1.0);
            if (!w) continue;
            w.position.set(-W/2, 0, -D/2 + 1 + i * 2);
            w.rotation.y = -Math.PI / 2;
            g.add(w);
        }
        // Right (+X)
        for (let i = 0; i < dCells; i++) {
            const name = Math.random() < 0.3 ? wallWin : wallSimple;
            const w = makeVillageProp(name, 1.0);
            if (!w) continue;
            w.position.set(W/2, 0, -D/2 + 1 + i * 2);
            w.rotation.y = Math.PI / 2;
            g.add(w);
        }

        // --- Corners ---
        const cornerSet = [
            [-W/2, -D/2, Math.PI],         // back-left
            [ W/2, -D/2, -Math.PI/2],      // back-right
            [-W/2,  D/2, Math.PI/2],       // front-left
            [ W/2,  D/2, 0],               // front-right
        ];
        for (const [cx_, cz_, cr] of cornerSet) {
            const c = makeVillageProp(corner, 1.0);
            if (!c) continue;
            c.position.set(cx_, 0, cz_);
            c.rotation.y = cr;
            g.add(c);
        }

        // --- Door panel in the front opening ---
        const doorName = style === 'brick' ? 'DoorFrame_Flat_Brick' : 'DoorFrame_Flat_WoodDark';
        const frame = makeVillageProp(doorName, 1.0);
        if (frame) {
            frame.position.set(-W/2 + 1 + doorCellIdx * 2, 0, D/2 - 0.1);
            g.add(frame);
        }
        const door = makeVillageProp('Door_1_Flat', 1.0);
        if (door) {
            door.position.set(-W/2 + 1 + doorCellIdx * 2 - 0.55, 0, D/2 - 0.15);
            g.add(door);
        }

        // --- Roof: scale Roof_2x4_RoundTile to cover footprint ---
        const roof = makeVillageProp('Roof_2x4_RoundTile', 1.0);
        if (roof) {
            roof.scale.set(W / 3.29, 1.0, D / 4.23);
            roof.position.set(0, WALL_H, 0);
            g.add(roof);
        }

        // --- Chimney ---
        if (Math.random() < 0.9) {
            const chim = makeVillageProp(Math.random() < 0.5 ? 'Prop_Chimney' : 'Prop_Chimney2', 1.0);
            if (chim) {
                chim.position.set((Math.random() - 0.5) * (W - 1.5), WALL_H + 0.5, (Math.random() - 0.5) * (D - 1.5));
                g.add(chim);
            }
        }

        // --- Occasional vine on a random wall ---
        if (Math.random() < 0.5) {
            const vineName = ['Prop_Vine1','Prop_Vine2','Prop_Vine4'][Math.floor(Math.random() * 3)];
            const v = makeVillageProp(vineName, 1.0);
            if (v) {
                const side = Math.floor(Math.random() * 4);
                const positions = [
                    { x: rand(-W/4, W/4), z:  D/2 + 0.1, r: 0 },
                    { x: rand(-W/4, W/4), z: -D/2 - 0.1, r: Math.PI },
                    { x: -W/2 - 0.1, z: rand(-D/4, D/4), r: -Math.PI/2 },
                    { x:  W/2 + 0.1, z: rand(-D/4, D/4), r: Math.PI/2 },
                ];
                v.position.set(positions[side].x, 0, positions[side].z);
                v.rotation.y = positions[side].r;
                g.add(v);
            }
        }

        g.position.set(x, sampleGroundY(x, z), z);
        g.rotation.y = rotY || 0;
        return g;
    }

    // Add MegaKit props scattered around a village center
    function decorateVillage(cx, cz) {
        if (Object.keys(villageProps).length === 0) return;
        const VILLAGE_R = 50;

        // Wooden fence perimeter (partial ring of fence segments)
        const fenceCount = 12 + Math.floor(Math.random() * 8);
        for (let i = 0; i < fenceCount; i++) {
            const ang = (i / fenceCount) * Math.PI * 2 + rand(-0.15, 0.15);
            const r = VILLAGE_R * rand(0.9, 1.1);
            const fx = cx + Math.cos(ang) * r;
            const fz = cz + Math.sin(ang) * r;
            const prop = makeVillageProp(Math.random() < 0.7 ? 'Prop_WoodenFence_Single' : 'Prop_WoodenFence_Extension1', 1.2);
            if (!prop) continue;
            prop.position.set(fx, sampleGroundY(fx, fz), fz);
            prop.rotation.y = ang + Math.PI / 2;
            propRoot.add(prop);
        }

        // Wagons (1-2 per village)
        const wagonCount = 1 + Math.floor(Math.random() * 2);
        for (let i = 0; i < wagonCount; i++) {
            const ang = rand(0, Math.PI * 2);
            const r = rand(12, 28);
            const wx = cx + Math.cos(ang) * r;
            const wz = cz + Math.sin(ang) * r;
            const prop = makeVillageProp('Prop_Wagon', 1.0);
            if (!prop) continue;
            prop.position.set(wx, sampleGroundY(wx, wz), wz);
            prop.rotation.y = rand(0, Math.PI * 2);
            propRoot.add(prop);
        }

        // Crate piles (scattered)
        const crateCount = 3 + Math.floor(Math.random() * 4);
        for (let i = 0; i < crateCount; i++) {
            const ang = rand(0, Math.PI * 2);
            const r = rand(8, 32);
            const crx = cx + Math.cos(ang) * r;
            const crz = cz + Math.sin(ang) * r;
            const crate = makeVillageProp('Prop_Crate', 1.0);
            if (!crate) continue;
            crate.position.set(crx, sampleGroundY(crx, crz), crz);
            crate.rotation.y = rand(0, Math.PI * 2);
            propRoot.add(crate);
            // Sometimes a brick pile beside crates
            if (Math.random() < 0.4) {
                const brick = makeVillageProp(Math.random() < 0.5 ? 'Prop_Brick1' : 'Prop_Brick2', 1.0);
                if (brick) {
                    brick.position.set(crx + rand(-1.5, 1.5), sampleGroundY(crx, crz), crz + rand(-1.5, 1.5));
                    brick.rotation.y = rand(0, Math.PI * 2);
                    propRoot.add(brick);
                }
            }
        }

        // A few metal fence ornaments (decorative, at entrance)
        for (let i = 0; i < 2; i++) {
            const angle = rand(0, Math.PI * 2);
            const r = rand(18, 25);

        // ================================================
        // REPLACE PROCEDURAL HOUSES with MegaKit houses
        // ================================================
        if (typeof houseColliders !== 'undefined') {
            for (const h of houseColliders) {
                if (!h.isProcedural || !h.exteriorGroup) continue;
                if (Math.hypot(h.x - cx, h.z - cz) > 60) continue;

                // Snap procedural house footprint to 2m grid
                const wCells = Math.max(2, Math.round(h.w / 2));
                const dCells = Math.max(2, Math.round(h.d / 2));
                const style = Math.random() < 0.55 ? 'plaster' : 'brick';

                // Remove the procedural house (keep the door pivot logic cleanup minimal)
                propRoot.remove(h.exteriorGroup);
                // Dispose geometries to free memory
                h.exteriorGroup.traverse(c => {
                    if (c.isMesh && c.geometry && c.geometry.dispose) c.geometry.dispose();
                });

                // Build a kit house at the same place with matching rotation
                const kit = buildKitHouse(h.x, h.z, h.rot, wCells, dCells, style);
                if (kit) {
                    propRoot.add(kit);
                    h.exteriorGroup = kit;

    // Build a cloned animal with its own AnimationMixer
    function buildGltfAnimal(modelName, scale) {
        const src = animalModels[modelName];
        if (!src) return null;

        // Use SkeletonUtils.clone so skinning works per-instance
        const scene = THREE.SkeletonUtils.clone(src.scene);
        scene.traverse(c => {
            if (c.isMesh || c.isSkinnedMesh) {
                c.castShadow = true;
                c.receiveShadow = true;
            }
        });

        const group = new THREE.Group();
        group.add(scene);
        group.scale.setScalar(scale);

        // Build actions from the shared clips (per-instance mixer)
        const mixer = new THREE.AnimationMixer(scene);
        const actions = {};
        for (const [name, clip] of Object.entries(src.clips)) {
            actions[name] = mixer.clipAction(clip);
        }
        group.userData.mixer = mixer;
        group.userData.actions = actions;
        group.userData.currentAction = null;
        return group;
    }

    // Play a named animation, crossfading from the current one
    function playAnimation(group, actionName, fadeTime = 0.25) {
        const actions = group.userData.actions;
        if (!actions || !actions[actionName]) return;
        const next = actions[actionName];
        const prev = group.userData.currentAction;
        if (prev === next) return;
        next.enabled = true;
        next.setEffectiveTimeScale(1);
        next.setEffectiveWeight(1);
        next.reset();
        if (prev) {
            next.crossFadeFrom(prev, fadeTime, false);
        }
        next.play();
        group.userData.currentAction = next;
    }

    // Find a valid spawn position (open land, on ground, away from river)

    // groupSize: how many animals per group (2-8)
    // groupCount: how many groups to spawn

    let animalGroupCounter = 0;
    function spawnHerd(spec, groupCount, groupSize, groupRadius) {
        for (let g = 0; g < groupCount; g++) {
            const center = findSpawnPos(undefined, undefined, 0);
            if (!center) continue;
            const groupId = ++animalGroupCounter;
            const n = Math.round(groupSize + rand(-groupSize*0.3, groupSize*0.3));
            for (let i = 0; i < n; i++) {
                const pos = findSpawnPos(center.x, center.z, groupRadius);
                if (!pos) continue;
                spawnOneAnimal(spec, pos.x, pos.z, groupId);
            }
        }
    }

    const SWING_DUR = 0.45;
    function startSwing() {
        if (swingT > 0) return;
        swingT = SWING_DUR;
        // Hit-test the nearest live tree in front of the camera within 6 m.
        const fwd = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
        let bestTree = null, bestDot = -1, bestDist = 9999;
        for (const t of trees) {
            if (!t.alive) continue;
            const dx = t.x - camera.position.x;
            const dz = t.z - camera.position.z;
            const dist = Math.hypot(dx, dz);
            if (dist > 7) continue;
            const dot = (dx * fwd.x + dz * fwd.z) / dist;
            if (dot < 0.35) continue;     // not in front
            if (dist < bestDist) { bestDist = dist; bestTree = t; bestDot = dot; }
        }
        if (bestTree) {
            bestTree.alive = false;
            bestTree.fallStart = performance.now();
            bestTree.fallAxisX = -(bestTree.z - camera.position.z);
            bestTree.fallAxisZ =  (bestTree.x - camera.position.x);
            const len = Math.hypot(bestTree.fallAxisX, bestTree.fallAxisZ) || 1;
            bestTree.fallAxisX /= len;
            bestTree.fallAxisZ /= len;
        }
    }

    // Vertical physics
    const GRAVITY = 28;      // m/s^2

    const staminaEl = document.getElementById('stamina').firstElementChild;
    // Collision: trees + per-wall house slabs (in the house's local frame).
    const PLAYER_R = 0.30;
    // Animals-only collision: houses and colliders, but not trees
    function collideHousesOnly(x, z) {
        for (const h of houseColliders) {
            if (!h.w) continue;
            if (h.doorOpen) continue;
            const dx = x - h.x, dz = z - h.z;
            const cosR = Math.cos(-h.rot), sinR = Math.sin(-h.rot);
            const lx = dx * cosR - dz * sinR;
            const lz = dx * sinR + dz * cosR;
            const halfW = h.w / 2, halfD = h.d / 2;
            if (lx < -halfW - PLAYER_R || lx > halfW + PLAYER_R) continue;
            if (lz < -halfD - PLAYER_R || lz > halfD + PLAYER_R) continue;
            // Inside house footprint; push to nearest edge
            const pushX = Math.abs(lx) > halfW ? Math.sign(lx) * (halfW + PLAYER_R) : lx;
            const pushZ = Math.abs(lz) > halfD ? Math.sign(lz) * (halfD + PLAYER_R) : lz;
            const cosF = Math.cos(h.rot), sinF = Math.sin(h.rot);
            return {
                x: h.x + pushX * cosF - pushZ * sinF,
                z: h.z + pushX * sinF + pushZ * cosF,
            };
        }
        return null;
    }

    function collide(x, z) {
        // Trees: circular trunk
        for (const t of trees) {
            if (!t.alive) continue;
            const dx = x - t.x, dz = z - t.z;
            const dd = dx * dx + dz * dz;
            const r = t.radius + PLAYER_R;
            if (dd < r * r) {
                const dist = Math.sqrt(dd) || 0.001;
                return { x: t.x + dx / dist * r, z: t.z + dz / dist * r };
            }
        }
        // Houses: rotate the player into local space, test each wall slab
        for (const h of houseColliders) {
            if (!h.w) continue;     // (the well uses the legacy circle below)
            // When door is open, skip ALL collision for this house so player
            // can walk through the doorway freely.
            if (h.doorOpen) continue;
            const dx = x - h.x, dz = z - h.z;
            const cosR = Math.cos(-h.rot), sinR = Math.sin(-h.rot);
            const lx = dx * cosR - dz * sinR;
            const lz = dx * sinR + dz * cosR;
            const halfW = h.w / 2, halfD = h.d / 2;
            // Quick reject: outside the bounding rect (expanded)
            if (lx < -halfW - PLAYER_R || lx > halfW + PLAYER_R) continue;
            if (lz < -halfD - PLAYER_R || lz > halfD + PLAYER_R) continue;

            const slabs = [
                // back wall: full width
                { x1: -halfW, x2:  halfW, z1: -halfD,             z2: -halfD + h.wallT },
                // left wall
                { x1: -halfW, x2: -halfW + h.wallT, z1: -halfD,   z2:  halfD },
                // right wall
                { x1:  halfW - h.wallT, x2: halfW, z1: -halfD,    z2:  halfD },
                // front wall: left of door
                { x1: -halfW, x2: -h.doorW / 2, z1: halfD - h.wallT, z2: halfD },
                // front wall: right of door
                { x1:  h.doorW / 2, x2: halfW,  z1: halfD - h.wallT, z2: halfD },
            ];
            // If the door is closed, the door itself is a solid slab
            if (!h.doorOpen) {
                slabs.push({ x1: -h.doorW / 2, x2: h.doorW / 2,
                             z1: halfD - h.wallT, z2: halfD });
            }

            for (const s of slabs) {
                if (lx > s.x1 - PLAYER_R && lx < s.x2 + PLAYER_R &&
                    lz > s.z1 - PLAYER_R && lz < s.z2 + PLAYER_R) {
                    // Push out along the smallest penetration
                    const dxL = lx - (s.x1 - PLAYER_R);
                    const dxR = (s.x2 + PLAYER_R) - lx;
                    const dzD = lz - (s.z1 - PLAYER_R);
                    const dzU = (s.z2 + PLAYER_R) - lz;
                    const minD = Math.min(dxL, dxR, dzD, dzU);
                    let nLx = lx, nLz = lz;
                    if      (minD === dxL) nLx = s.x1 - PLAYER_R;
                    else if (minD === dxR) nLx = s.x2 + PLAYER_R;
                    else if (minD === dzD) nLz = s.z1 - PLAYER_R;
                    else                   nLz = s.z2 + PLAYER_R;
                    const cosF = Math.cos(h.rot), sinF = Math.sin(h.rot);
                    return {
                        x: h.x + nLx * cosF - nLz * sinF,
                        z: h.z + nLx * sinF + nLz * cosF,
                    };
                }
            }
        }
        // Wells (legacy circular collider)
        for (const h of houseColliders) {
            if (h.w) continue;
            const dx = x - h.x, dz = z - h.z;
            if (Math.abs(dx) < h.hw && Math.abs(dz) < h.hd) {
                const px = h.hw - Math.abs(dx);
                const pz = h.hd - Math.abs(dz);
                if (px < pz) return { x: h.x + Math.sign(dx) * h.hw, z };
                else         return { x, z: h.z + Math.sign(dz) * h.hd };
            }
        }
        return null;
    }

    // Returns the house the player is currently inside (or null).
    function insideHouse(x, z) {
        for (const h of houseColliders) {
            if (!h.w) continue;
            const dx = x - h.x, dz = z - h.z;
            const cosR = Math.cos(-h.rot), sinR = Math.sin(-h.rot);
            const lx = dx * cosR - dz * sinR;
            const lz = dx * sinR + dz * cosR;
            const inset = h.wallT + 0.18;
            if (lx > -h.w / 2 + inset && lx < h.w / 2 - inset &&
                lz > -h.d / 2 + inset && lz < h.d / 2 - inset) return h;
        }
        return null;
    }

    // Find the nearest house with a door the player is facing, for E key.
    function nearestDoor(x, z, yaw) {
        const fx = -Math.sin(yaw), fz = -Math.cos(yaw);
        let best = null, bestD = 12;    // max door interaction range (m)
        for (const h of houseColliders) {
            if (!h.w) continue;
            // Door world position: house front center, displaced along its +Z (in local)
            const cosF = Math.cos(h.rot), sinF = Math.sin(h.rot);
            const wx = h.x + 0 * cosF - (h.d / 2) * sinF;
            const wz = h.z + 0 * sinF + (h.d / 2) * cosF;
            const dx = wx - x, dz = wz - z;
            const dist = Math.hypot(dx, dz);
            if (dist > bestD) continue;
            const dot = (dx * fx + dz * fz) / (dist || 1);
            // No facing check — just need to be nearby
            if (dist < bestD) { bestD = dist; best = h; }
        }
        return best;
    }
    function tryJump() { if (vy <= 0) vy = JUMP_V; }

    // Movement
    let yaw = 0, pitch = 0;
    const move = { f: false, b: false, l: false, r: false, run: false };
    addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        if (k === 'w') move.f = true;
        if (k === 's') move.b = true;
        if (k === 'a') move.l = true;
        if (k === 'd') move.r = true;
        if (k === 'shift') move.run = true;
        if (k === ' ' || k === 'spacebar') { tryJump(); e.preventDefault(); }
        if (k === 'l' || k === 'f') startSwing();
        if (k === 'e') {
            const h = nearestDoor(camera.position.x, camera.position.z, yaw);
            if (h) h.doorOpen = !h.doorOpen;
        }
    });
    addEventListener('keyup', e => {
        const k = e.key.toLowerCase();
        if (k === 'w') move.f = false;
        if (k === 's') move.b = false;
        if (k === 'a') move.l = false;
        if (k === 'd') move.r = false;
        if (k === 'shift') move.run = false;
    });
    window.addEventListener('mousedown', e => {
        if (!document.pointerLockElement) {
            renderer.domElement.requestPointerLock();
            return;
        }
        if (e.button === 0) startSwing();
    });
    addEventListener('mousemove', e => {
        if (document.pointerLockElement) {
            yaw   -= e.movementX * 0.0042;
            pitch -= e.movementY * 0.0042;
            pitch = Math.max(-1.3, Math.min(1.3, pitch));
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
        }
    });
    addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });

    const biomeEl = document.getElementById('biome');
    const fpsEl = document.getElementById('biome');
    let fpsFrames = 0, fpsLast = performance.now();
    const doorPromptEl = document.getElementById('doorprompt');
    let lastBiome = -1;
    let last = performance.now();

    function animate(now) {
        requestAnimationFrame(animate);
        const dt = Math.min(0.05, (now - last) / 1000);
        last = now;

        const running = move.run && stamina > 0.05;
        const speed = (running ? 26 : 16) * dt;
        const fwd = (move.f ? 1 : 0) - (move.b ? 1 : 0);
        const str = (move.r ? 1 : 0) - (move.l ? 1 : 0);
        const moving = (fwd !== 0 || str !== 0);
        if (moving) {
            const len = Math.hypot(fwd, str);
            const nx = -Math.sin(yaw) * (fwd / len) + Math.cos(yaw) * (str / len);
            const nz = -Math.cos(yaw) * (fwd / len) - Math.sin(yaw) * (str / len);
            // Sub-step the movement so we never tunnel through thin walls.
            const stepSize = 0.12;
            const totalDist = speed;
            const subs = Math.max(1, Math.ceil(totalDist / stepSize));
            const sxStep = nx * speed / subs;
            const szStep = nz * speed / subs;
            for (let s = 0; s < subs; s++) {
                const nextX = camera.position.x + sxStep;
                const nextZ = camera.position.z + szStep;
                const hit = collide(nextX, nextZ);
                if (hit) {
                    camera.position.x = hit.x;
                    camera.position.z = hit.z;
                    break;
                } else {
                    camera.position.x = nextX;
                    camera.position.z = nextZ;
                }
            }
        }
        // Stamina
        if (running && moving) stamina = Math.max(0, stamina - STAM_DRAIN * dt);
        else                   stamina = Math.min(1, stamina + STAM_REGEN * dt);
        staminaEl.style.width = (stamina * 100).toFixed(1) + '%';
        // Sprint FOV punch
        const targetFov = running && moving ? 66 : 60;
        camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 6);
        camera.updateProjectionMatrix();
        // Vertical: glue to ground except when jumping. If inside a house,
        // walk on the house's flat anchor floor instead of the rolling terrain.
        const inHouse = insideHouse(camera.position.x, camera.position.z);
        const gh = inHouse ? (inHouse.anchorY + 0.22) : sampleGroundY(camera.position.x, camera.position.z);
        const floorY = gh + EYE;
        if (vy > 0) {
            vy -= GRAVITY * dt;
            camera.position.y += vy * dt;
            if (camera.position.y <= floorY) { camera.position.y = floorY; vy = 0; }
        } else {
            camera.position.y = floorY;
            vy = 0;
        }
        // Head bob (only when grounded and moving)
        if (moving && vy === 0) {
            bobPhase += dt * (running ? 13 : 8);
            const bobAmp = running ? 0.18 : 0.10;
            camera.position.y += Math.sin(bobPhase) * bobAmp;
        } else {
            bobPhase *= 0.9;
        }

        // Day/night
        timeOfDay = (timeOfDay + dt / DAY_LENGTH) % 1;
        updateSky(timeOfDay);

        // Tree fall animation
        for (const t of trees) {
            if (t.alive || t.fall >= 1) continue;
            t.fall = Math.min(1, t.fall + dt * 1.4);
            const ang = (t.fall * t.fall) * (Math.PI / 2 - 0.05);
            t.obj.rotation.set(t.fallAxisX * ang, t.obj.rotation.y, t.fallAxisZ * ang);
        }
        // Door swing animation (slower so it's clearly visible)
        for (const h of houseColliders) {
            if (!h.doorPivot) continue;
            const target = h.doorOpen ? -Math.PI * 0.55 : 0;
            h.doorAng += (target - h.doorAng) * Math.min(1, dt * 3);
            h.doorPivot.rotation.y = h.doorAng;
        }
        // Door prompt
        const doorH = nearestDoor(camera.position.x, camera.position.z, yaw);
        if (doorH) {
            doorPromptEl.textContent = doorH.doorOpen ? 'Press E to close' : 'Press E to open';
            doorPromptEl.style.display = 'block';
        } else {
            doorPromptEl.style.display = 'none';
        }
        // Wind sway on living trees
        const wt = now * 0.001;
        const windStrength = 0.025 + Math.sin(wt * 0.3) * 0.012;
        for (const t of swaying) {
            if (!t.alive) continue;
            const phase = wt * 1.4 + t.seed;
            t.obj.rotation.x = t.baseRotX + Math.sin(phase)        * windStrength;
            t.obj.rotation.z = t.baseRotZ + Math.cos(phase * 0.8)  * windStrength;
        }

        // Compute herd centroids once per frame (avg position of each group)
        const herdCentroids = {};
        for (const a of animals) {
            if (!a.alive || a.groupId <= 0) continue;
            const h = herdCentroids[a.groupId] || (herdCentroids[a.groupId] = { x: 0, z: 0, count: 0 });
            h.x += a.x; h.z += a.z; h.count++;
        }

        // Animal AI + walk-cycle leg animation
        for (const a of animals) {
            const s = a.spec;
            const dxp = camera.position.x - a.x;
            const dzp = camera.position.z - a.z;
            const distP = Math.hypot(dxp, dzp);
            let dirX, dirZ, sp;
            if (s.chaseR && distP < s.chaseR) {
                // Bear: chase the player
                dirX = dxp / (distP || 1);
                dirZ = dzp / (distP || 1);
                sp = s.speedChase;
            } else if (s.fleeR && distP < s.fleeR) {
                // Rabbit/deer: flee
                dirX = -dxp / (distP || 1);
                dirZ = -dzp / (distP || 1);
                sp = s.speedFlee;
            } else {
                a.wanderT -= dt;
                if (a.wanderT <= 0) {
                    a.wanderT = rand(2.5, 6);
                    a.dirX = rand(-1, 1);
                    a.dirZ = rand(-1, 1);
                    const m = Math.hypot(a.dirX, a.dirZ) || 1;
                    a.dirX /= m; a.dirZ /= m;

                    // Herd cohesion: bias direction toward group centroid
                    if (a.groupId > 0 && s.social > 0) {
                        const cent = herdCentroids[a.groupId];
                        if (cent && cent.count > 1) {
                            const cx = cent.x / cent.count;
                            const cz = cent.z / cent.count;
                            const toC_x = cx - a.x;
                            const toC_z = cz - a.z;
                            const distC = Math.hypot(toC_x, toC_z) || 1;
                            // If far from group, blend cohesion pull into wander direction
                            if (distC > 8) {
                                const weight = Math.min(1.0, s.social * (distC / 40));
                                a.dirX = a.dirX * (1 - weight) + (toC_x / distC) * weight;
                                a.dirZ = a.dirZ * (1 - weight) + (toC_z / distC) * weight;
                                const m2 = Math.hypot(a.dirX, a.dirZ) || 1;
                                a.dirX /= m2; a.dirZ /= m2;
                            }
                        }
                    }
                }
                dirX = a.dirX; dirZ = a.dirZ;
                sp = s.speedWalk;
            }
            a.x += dirX * sp * dt;
            a.z += dirZ * sp * dt;
            if (a.x < -WORLD/2 + 30) a.x = -WORLD/2 + 30;
            if (a.x >  WORLD/2 - 30) a.x =  WORLD/2 - 30;
            if (a.z < -WORLD/2 + 30) a.z = -WORLD/2 + 30;
            if (a.z >  WORLD/2 - 30) a.z =  WORLD/2 - 30;
            // Animals ignore tree collision (they can walk through trunks visually)
            // but still collide with house walls.
            const aHit = collideHousesOnly(a.x, a.z);
            if (aHit) {
                a.x = aHit.x; a.z = aHit.z;
                a.dirX = -a.dirX; a.dirZ = -a.dirZ;
                a.wanderT = 0;
            }
            a.obj.position.set(a.x, sampleGroundY(a.x, a.z), a.z);
            // GLTF animals face +Z forward (Quaternius convention).
            // Procedural animals (legacy, none remain) faced +X, needed a -PI/2 offset.
            a.obj.rotation.y = Math.atan2(dirX, dirZ);

            // GLTF-based animation: pick clip by speed / state, advance mixer
            if (a.obj.userData.mixer) {
                const mixer = a.obj.userData.mixer;
                let desired;
                if (sp < 0.3)       desired = s.idleAnim || 'Idle';
                else if (sp < 3.5)  desired = s.walkAnim || 'Walk';
                else                desired = s.runAnim  || 'Gallop';
                playAnimation(a.obj, desired, 0.25);
                mixer.update(dt);
            } else if (a.obj.userData.legs) {
                // Procedural fallback: legacy paired-diagonal gait
                const cycleRate = (s.cycleSpeed || 6) * (sp / (s.speedWalk || 2));
                a.phase = (a.phase || 0) + cycleRate * dt;
                const amp = (s.legAmp || 0.4) * Math.min(1.4, sp / (s.speedWalk || 2));
                const legs = a.obj.userData.legs;
                legs[0].rotation.z =  Math.sin(a.phase)           * amp;
                legs[3].rotation.z =  Math.sin(a.phase)           * amp;
                legs[1].rotation.z =  Math.sin(a.phase + Math.PI) * amp;
                legs[2].rotation.z =  Math.sin(a.phase + Math.PI) * amp;
            }
        }

        // Villager AI + walk-cycle leg animation
        for (const v of villagers) {
            v.stateT -= dt;

            // --- State transitions based on time of day ---
            if (timeOfDay > 0.68 && v.state !== 'sleep' && v.state !== 'walkHome') {
                v.state = 'walkHome';
                v.stateT = 0;
            } else if (timeOfDay < 0.05 && v.state === 'sleep') {
                v.state = 'walkToWork';
                v.stateT = 0;
            }

            // --- Determine target position and speed ---
            let tgtX = v.x, tgtZ = v.z;
            let moveSpeed = 0;

            switch (v.state) {
                case 'walkToWork':
                    tgtX = v.workX; tgtZ = v.workZ;
                    moveSpeed = 2.5;
                    if (Math.hypot(v.x - tgtX, v.z - tgtZ) < 1.0) {
                        v.state = 'work';
                        v.stateT = rand(4, 10);
                    }
                    break;
                case 'work':
                    moveSpeed = 0;
                    if (v.stateT <= 0) {
                        v.state = 'walkToWell';
                        v.stateT = 0;
                    }
                    break;
                case 'walkToWell':
                    tgtX = v.wellX; tgtZ = v.wellZ;
                    moveSpeed = 2.5;
                    if (Math.hypot(v.x - tgtX, v.z - tgtZ) < 1.0) {
                        v.state = 'idle';
                        v.stateT = rand(3, 7);
                    }
                    break;
                case 'idle':
                    // Wander slowly near current position
                    if (v.stateT <= 0) {
                        v.stateT = rand(2, 5);
                        const wAng = rand(0, Math.PI * 2);
                        v.dirX = Math.cos(wAng);
                        v.dirZ = Math.sin(wAng);
                    }
                    moveSpeed = 0.6;
                    tgtX = v.x + v.dirX * 2;
                    tgtZ = v.z + v.dirZ * 2;
                    // After idle period, go back to work (if daytime)
                    if (v.stateT <= 0 && timeOfDay > 0.05 && timeOfDay < 0.68) {
                        v.state = 'walkToWork';
                        v.stateT = 0;
                    }
                    break;
                case 'walkHome':
                    tgtX = v.homeX; tgtZ = v.homeZ;
                    moveSpeed = 2.5;
                    if (Math.hypot(v.x - tgtX, v.z - tgtZ) < 1.0) {
                        v.state = 'sleep';
                        v.stateT = 0;
                    }
                    break;
                case 'sleep':
                    moveSpeed = 0;
                    break;
            }

            // --- Movement ---
            if (moveSpeed > 0) {
                const dx = tgtX - v.x;
                const dz = tgtZ - v.z;
                const dist = Math.hypot(dx, dz);
                if (dist > 0.2) {
                    const nx = dx / dist;
                    const nz = dz / dist;
                    v.x += nx * moveSpeed * dt;
                    v.z += nz * moveSpeed * dt;
                    v.dirX = nx;
                    v.dirZ = nz;
                    v.speed = moveSpeed;
                } else {
                    v.speed = 0;
                }
            } else {
                v.speed = 0;
            }

            // World bounds
            if (v.x < -WORLD/2 + 30) v.x = -WORLD/2 + 30;
            if (v.x >  WORLD/2 - 30) v.x =  WORLD/2 - 30;
            if (v.z < -WORLD/2 + 30) v.z = -WORLD/2 + 30;
            if (v.z >  WORLD/2 - 30) v.z =  WORLD/2 - 30;

            // Collide with house walls
            const vHit = collide(v.x, v.z);
            if (vHit) {
                v.x = vHit.x; v.z = vHit.z;
                v.dirX = -v.dirX; v.dirZ = -v.dirZ;
            }

            // Update position
            v.obj.position.set(v.x, sampleGroundY(v.x, v.z), v.z);

            // Face direction of travel (body +X is forward)
            if (v.speed > 0.1) {
                v.obj.rotation.y = Math.atan2(v.dirX, v.dirZ) - Math.PI / 2;
            }

            // Walk cycle: 2-leg bipedal gait
            const vLegs = v.obj.userData.legs;
            if (v.speed > 0.1) {
                const cycleRate = 6.0 * (v.speed / 2.5);
                v.phase += cycleRate * dt;
                const amp = 0.4 * Math.min(1.2, v.speed / 2.5);
                vLegs[0].rotation.z = Math.sin(v.phase) * amp;
                vLegs[1].rotation.z = Math.sin(v.phase + Math.PI) * amp;
            } else {
                // Idle: reset legs
                vLegs[0].rotation.z *= 0.9;
                vLegs[1].rotation.z *= 0.9;
            }
        }

        const b = biomeAt(camera.position.x, camera.position.z, gh);
        if (b !== lastBiome) { biomeEl.textContent = '— ' + BIOME_NAMES[b] + ' —'; lastBiome = b; }

        // Sword swing animation (overhead chop)
        if (swingT > 0) {
            swingT = Math.max(0, swingT - dt);
            const p = 1 - swingT / SWING_DUR;          // 0..1
            const arc = Math.sin(p * Math.PI);          // ease in/out
            sword.rotation.x = SWORD_REST.rx - arc * 1.8;
            sword.rotation.z = SWORD_REST.rz + arc * 0.6;
            sword.position.z = SWORD_REST.z - arc * 0.25;
        } else {
            sword.rotation.set(SWORD_REST.rx, SWORD_REST.ry, SWORD_REST.rz);
            sword.position.set(SWORD_REST.x, SWORD_REST.y, SWORD_REST.z);
        }

        fpsFrames++;
        if (now - fpsLast > 1000) {
            fpsEl.textContent = (fpsEl.textContent.split('|')[0].trim()) + ' | ' + fpsFrames + ' FPS';
            fpsFrames = 0; fpsLast = now;
        }

        renderer.render(scene, camera);
    }
    requestAnimationFrame(animate);
    </script>
</body>
</html>
