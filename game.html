    function buildWell(x, z) {
        const g = new THREE.Group();
        const stoneMat  = new THREE.MeshLambertMaterial({ color: 0x7a7670, flatShading: true });
        const stoneDark = new THREE.MeshLambertMaterial({ color: 0x4f4a44, flatShading: true });
        const woodMat   = new THREE.MeshLambertMaterial({ color: 0x4a2f18 });
        const woodDark  = new THREE.MeshLambertMaterial({ color: 0x2c1a0c });
        const thatchMat = new THREE.MeshLambertMaterial({ color: 0xb8862c });
        const thatchEdgeMat = new THREE.MeshLambertMaterial({ color: 0x7d5a18 });
        const waterMat  = new THREE.MeshLambertMaterial({ color: 0x16323a });

        const wellR = 1.4;
        const wellH = 1.2;
        // Stone ring (cylinder, slightly tapered)
        const ring = new THREE.Mesh(
            new THREE.CylinderGeometry(wellR, wellR + 0.1, wellH, 16),
            stoneMat
        );
        ring.position.y = wellH / 2;
        ring.castShadow = true; ring.receiveShadow = true;
        g.add(ring);
        // Decorative individual stones around the rim
        for (let i = 0; i < 12; i++) {
            const ang = (i / 12) * Math.PI * 2;
            const stone = new THREE.Mesh(
                new THREE.BoxGeometry(0.42, 0.36, 0.32),
                Math.random() < 0.5 ? stoneMat : stoneDark
            );
            stone.position.set(
                Math.cos(ang) * (wellR + 0.05),
                wellH + 0.18,
                Math.sin(ang) * (wellR + 0.05)
            );
            stone.rotation.y = ang;
            g.add(stone);
        }
        // Inner shaft (dark hole)
        const inner = new THREE.Mesh(
            new THREE.CylinderGeometry(wellR - 0.18, wellR - 0.18, 0.05, 16),
            new THREE.MeshLambertMaterial({ color: 0x05080a })
        );
        inner.position.y = wellH + 0.02;
        g.add(inner);
        // Water surface a little below the rim
        const water = new THREE.Mesh(
            new THREE.CylinderGeometry(wellR - 0.22, wellR - 0.22, 0.02, 16),
            waterMat
        );
        water.position.y = wellH - 0.4;
        g.add(water);

        // === Two posts holding up the roof + winch ===
        const postH = 3.2;
        for (const sx of [-1, 1]) {
            const post = new THREE.Mesh(
                new THREE.BoxGeometry(0.22, postH, 0.22),
                woodMat
            );
            post.position.set(sx * (wellR + 0.05), wellH + postH / 2, 0);
            post.castShadow = true;
            g.add(post);
        }

        // === Pitched roof: two slabs meeting at the ridge ===
        const wellRoofH = 1.1;
        const wellRoofRun = wellR + 0.6;
        const wellSlopeLen = Math.sqrt(wellRoofRun * wellRoofRun + wellRoofH * wellRoofH);
        const wellAng = Math.atan2(wellRoofH, wellRoofRun);
        const ridgeY = wellH + postH + 0.2;
        const slopeW = (wellR + 0.6) * 2 + 0.2;
        // Front slope (covers +Z half) — ridge edge at -Z, eave at +Z
        const slopeF = new THREE.Mesh(
            new THREE.BoxGeometry(slopeW, 0.18, wellSlopeLen + 0.2),
            thatchMat
        );
        slopeF.position.set(0, ridgeY - wellRoofH / 2, wellRoofRun / 2);
        slopeF.rotation.x = wellAng;
        slopeF.castShadow = true;
        g.add(slopeF);
        const slopeB = slopeF.clone();
        slopeB.position.z = -wellRoofRun / 2;
        slopeB.rotation.x = -wellAng;
        g.add(slopeB);
        // Ridge cap
        const wellRidge = new THREE.Mesh(
            new THREE.CylinderGeometry(0.12, 0.12, slopeW + 0.05, 8),
            thatchEdgeMat
        );
        wellRidge.rotation.z = Math.PI / 2;
        wellRidge.position.set(0, ridgeY, 0);
        g.add(wellRidge);

        // === Winch: horizontal log spanning the posts, with a crank handle ===
        const winchY = wellH + postH - 0.3;
        const winch = new THREE.Mesh(
            new THREE.CylinderGeometry(0.13, 0.13, (wellR + 0.05) * 2 - 0.1, 10),
            woodMat
        );
        winch.rotation.z = Math.PI / 2;
        winch.position.set(0, winchY, 0);
        winch.castShadow = true;
        g.add(winch);
        // Crank arm
        const crank = new THREE.Mesh(
            new THREE.BoxGeometry(0.05, 0.4, 0.05),
            woodDark
        );
        crank.position.set((wellR + 0.05) - 0.05, winchY - 0.2, 0);
        g.add(crank);
        // Crank handle
        const handle = new THREE.Mesh(
            new THREE.CylinderGeometry(0.05, 0.05, 0.25, 6),
            woodDark
        );
        handle.rotation.z = Math.PI / 2;
        handle.position.set((wellR + 0.05) + 0.1, winchY - 0.4, 0);
        g.add(handle);

        // === Rope hanging from the winch down toward the water ===
        const ropeMat = new THREE.MeshLambertMaterial({ color: 0xc8b078 });
        const ropeLen = winchY - (wellH + 0.6);
        const rope = new THREE.Mesh(
            new THREE.CylinderGeometry(0.025, 0.025, ropeLen, 5),
            ropeMat
        );
        rope.position.set(0, winchY - ropeLen / 2, 0);
        g.add(rope);

        // === Wooden bucket hanging at the bottom of the rope ===
        const bucket = new THREE.Mesh(
            new THREE.CylinderGeometry(0.28, 0.22, 0.36, 12),
            woodMat
        );
        bucket.position.set(0, winchY - ropeLen - 0.18, 0);
        bucket.castShadow = true;
        g.add(bucket);
        // Bucket bands
        for (const yo of [-0.12, 0.12]) {
            const band = new THREE.Mesh(
                new THREE.TorusGeometry(0.27, 0.018, 6, 16),
                woodDark
            );
            band.rotation.x = Math.PI / 2;
            band.position.set(0, winchY - ropeLen - 0.18 + yo, 0);
            g.add(band);
        }
        // Bucket handle
        const bhandle = new THREE.Mesh(
            new THREE.TorusGeometry(0.22, 0.012, 5, 12, Math.PI),
            woodDark
        );
        bhandle.position.set(0, winchY - ropeLen, 0);
        g.add(bhandle);

        let wellAnchor = sampleGroundY(x, z);
        // Sample around the rim and use the LOWEST so the well is never elevated
        for (let a = 0; a < 8; a++) {
            const ang = (a / 8) * Math.PI * 2;
            const yh = sampleGroundY(x + Math.cos(ang) * 3, z + Math.sin(ang) * 3);
            if (yh < wellAnchor) wellAnchor = yh;
        }
        flattenAt(x, z, 20.0, wellAnchor);
        _terrainEdited = true;
        g.position.set(x, wellAnchor, z);
        propRoot.add(g);
        houseColliders.push({ x, z, hw: 2.2, hd: 2.2, rot: 0 });
    }

    // ----- Dirt path: carve directly into the terrain mesh -----
    // Path width must be >> CELL (≈5m) so that multiple vertices always fall
    // within it; otherwise the path is invisible between grid points.
    const DIRT  = new THREE.Color(0x705028);
    const DIRT2 = new THREE.Color(0x553a1a);
    function carvePath(x1, z1, x2, z2, halfWidth, depth) {
        halfWidth = halfWidth || 6.5;
        depth     = depth     || 0.45;
        const pos = groundGeo.attributes.position;
        const col = groundGeo.attributes.color;
        const stride = SEG + 1;
        const dx = x2 - x1, dz = z2 - z1;
        const lenSq = dx * dx + dz * dz;
        if (lenSq < 0.01) return;
        const minX = Math.min(x1, x2) - halfWidth - CELL;
        const maxX = Math.max(x1, x2) + halfWidth + CELL;
        const minZ = Math.min(z1, z2) - halfWidth - CELL;
        const maxZ = Math.max(z1, z2) + halfWidth + CELL;
        const i0 = Math.max(0,   Math.floor((minX + WORLD / 2) / CELL));
        const i1 = Math.min(SEG, Math.ceil( (maxX + WORLD / 2) / CELL));
        const j0 = Math.max(0,   Math.floor((minZ + WORLD / 2) / CELL));
        const j1 = Math.min(SEG, Math.ceil( (maxZ + WORLD / 2) / CELL));
        for (let j = j0; j <= j1; j++) {
            for (let i = i0; i <= i1; i++) {
                const vx = -WORLD / 2 + i * CELL;
                const vz = -WORLD / 2 + j * CELL;
                const t = Math.max(0, Math.min(1,
                    ((vx - x1) * dx + (vz - z1) * dz) / lenSq));
                const px = x1 + dx * t, pz = z1 + dz * t;
                const d = Math.hypot(vx - px, vz - pz);
                if (d > halfWidth) continue;
                const idx = j * stride + i;
                const u = d / halfWidth;          // 0 center -> 1 edge
                const fade = 1 - u * u;            // sharper at center
                pos.setY(idx, pos.getY(idx) - depth * fade);
                // Solid dirt at center, blends to surrounding biome at edge
                const target = u < 0.5 ? DIRT2 : DIRT;
                const k = u < 0.7 ? 1 : (1 - (u - 0.7) / 0.3);
                const r = col.getX(idx) * (1 - k) + target.r * k;
                const gC = col.getY(idx) * (1 - k) + target.g * k;
                const b = col.getZ(idx) * (1 - k) + target.b * k;
                col.setXYZ(idx, r, gC, b);
            }
        }
    }

    // ----- Flatten terrain under a circular footprint to a fixed Y -----
    // After placing a house at (cx,cz), call flattenAt(cx, cz, radius, anchorY)
    // to force every terrain vertex within `radius` to sit at anchorY. This
    // guarantees the house actually rests on flat ground regardless of slope.
    function flattenAt(cx, cz, radius, anchorY) {
        const pos = groundGeo.attributes.position;
        const stride = SEG + 1;
        const r2 = radius * radius;
        const i0 = Math.max(0,   Math.floor((cx - radius + WORLD / 2) / CELL));
        const i1 = Math.min(SEG, Math.ceil( (cx + radius + WORLD / 2) / CELL));
        const j0 = Math.max(0,   Math.floor((cz - radius + WORLD / 2) / CELL));
        const j1 = Math.min(SEG, Math.ceil( (cz + radius + WORLD / 2) / CELL));
        for (let j = j0; j <= j1; j++) {
            for (let i = i0; i <= i1; i++) {
                const vx = -WORLD / 2 + i * CELL;
                const vz = -WORLD / 2 + j * CELL;
                const dx = vx - cx, dz = vz - cz;
                const dd = dx * dx + dz * dz;
                if (dd > r2) continue;
                const idx = j * stride + i;
                // Inside core: hard flatten. Edge: blend so it eases out.
                const u = Math.sqrt(dd) / radius;     // 0..1
                if (u < 0.85) {
                    pos.setY(idx, anchorY);            // hard flat core
                } else {
                    const k = (u - 0.85) / 0.15;       // 0..1 ease-out at edge
                    pos.setY(idx, pos.getY(idx) * k + anchorY * (1 - k));
                }
            }
        }
    }

    let _terrainEdited = false;

    // Continuous dirt path ribbon. Builds one BufferGeometry strip whose
    // left and right edges hug the terrain via sampleGroundY at every step.
    // No gaps, no overlaps, follows hills smoothly. Vertex-colored with
    // hash-based variation so it reads as dirt rather than a flat slab.
    const PATH_DIRT_A = new THREE.Color(0x6c4823);
    const PATH_DIRT_B = new THREE.Color(0x4a3014);
    const pathMaterial = new THREE.MeshLambertMaterial({ vertexColors: true, side: THREE.DoubleSide });
    function buildPath(x1, z1, x2, z2, halfWidth) {
        halfWidth = halfWidth || 2.2;
        const dx = x2 - x1, dz = z2 - z1;
        const len = Math.hypot(dx, dz);
        if (len < 0.5) return;
        const ux = dx / len, uz = dz / len;
        const nx = -uz, nz = ux;
        const step = 0.7;
        const n = Math.max(2, Math.ceil(len / step));
        const verts  = [];
        const colors = [];
        const idx    = [];
        // Simple top-only ribbon, 2 verts per step, hugging the ground
        for (let i = 0; i <= n; i++) {
            const t = i / n;
            const wobble = Math.sin(i * 0.45) * 0.22;
            const cxw = x1 + dx * t + nx * wobble;
            const czw = z1 + dz * t + nz * wobble;
            const w = halfWidth * (0.92 + Math.sin(i * 0.8) * 0.08);
            const lx = cxw + nx * w, lz = czw + nz * w;
            const rx = cxw - nx * w, rz = czw - nz * w;
            verts.push(lx, sampleGroundY(lx, lz) + 0.12, lz);
            verts.push(rx, sampleGroundY(rx, rz) + 0.12, rz);

            const k1 = 0.35 + Math.abs(Math.sin(i * 2.31 + lx * 0.07)) * 0.65;
            const k2 = 0.35 + Math.abs(Math.cos(i * 1.77 + rx * 0.09)) * 0.65;
            const c1 = PATH_DIRT_A.clone().lerp(PATH_DIRT_B, 1 - k1);
            const c2 = PATH_DIRT_A.clone().lerp(PATH_DIRT_B, 1 - k2);
            colors.push(c1.r, c1.g, c1.b);
            colors.push(c2.r, c2.g, c2.b);
        }
        for (let i = 0; i < n; i++) {
            const a = i * 2;
            idx.push(a, a + 2, a + 1, a + 1, a + 2, a + 3);
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors, 3));
        geo.setIndex(idx);
        geo.computeVertexNormals();
        const mesh = new THREE.Mesh(geo, pathMaterial);
        mesh.receiveShadow = true; mesh.castShadow = true;
        propRoot.add(mesh);
        _terrainEdited = true;
    }

    // ===================================================================
    //  VILLAGER SYSTEM — typed villagers with per-type accessories
    // ===================================================================
    const VILLAGER_TYPES = [
        { name: 'blacksmith' },
        { name: 'farmer' },
        { name: 'baker' },
        { name: 'chief' },
        { name: 'librarian' },
        { name: 'guard' },
    ];
    const villagers = [];

    function buildVillager(type) {
        const g = new THREE.Group();
        // Chunky low-poly villager matching reference proportions.
        // The CLOTHES are the body — no separate skin torso underneath.
        // Total height ≈ 1.7m. Head sits directly on shoulders, no neck gap.

        // Tunic/clothes color by type (the clothes ARE the body)
        const T = {
            blacksmith: { tunic: 0x7a5a3a, pants: 0x4a3828, skin: 0xb8845c, beard: 0x5a3a1a, hair: null, apron: 0x3a2210 },
            farmer:     { tunic: 0x8a7a50, pants: 0x5a4a30, skin: 0xc8a078, beard: 0x5a3a1a, hair: 0x4a3018, hat: 0xb8a060 },
            baker:      { tunic: 0x7a6a4a, pants: 0x5a4a30, skin: 0xd4b088, beard: 0x5a3a1a, hair: 0x4a3018, apron: 0xe8e0d0 },
            chief:      { tunic: 0x8a2828, pants: 0x3a2020, skin: 0xc8a078, beard: 0x888888, hair: 0x888888, cloak: 0x6a2020, fur: 0x6a5a48 },
            librarian:  { tunic: 0x5a3a1a, pants: 0x5a3a1a, skin: 0xc8a078, beard: null,     hair: null,     robe: 0x5a3a1a },
            guard:      { tunic: 0x888888, pants: 0x4a4a4a, skin: 0xc8a078, beard: 0x5a3a1a, hair: 0x4a3018, helmet: 0x707070 },
        }[type] || { tunic: 0x6a5040, pants: 0x4a3828, skin: 0xc8a078, beard: 0x5a3a1a, hair: 0x4a3018 };

        const tunicMat = new THREE.MeshLambertMaterial({ color: T.tunic });
        const pantsMat = new THREE.MeshLambertMaterial({ color: T.pants });
        const skinMat  = new THREE.MeshLambertMaterial({ color: T.skin });
        const eyeMat   = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });
        const bootMat  = new THREE.MeshLambertMaterial({ color: 0x4a2e14 });

        // ======= BODY — stacked blocks, everything overlaps, no gaps =======
        // Like the reference: chunky Minecraft-style villagers.
        // The TUNIC BOX is the main body. Arms are flush at its edges.

        // TORSO — one wide thick block = the tunic
        const torsoW = 0.52, torsoD = 0.30, torsoH = 0.55, torsoY = 0.98;
        const torso = new THREE.Mesh(new THREE.BoxGeometry(torsoD, torsoH, torsoW), tunicMat);
        torso.position.set(0, torsoY, 0);
        torso.castShadow = true;
        g.add(torso);

        // NECK — wide block filling the gap between torso top and head
        const neck = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.10, 0.22), skinMat);
        neck.position.set(0, torsoY + torsoH/2 + 0.05, 0);
        g.add(neck);

        // HEAD — directly on top of neck
        const headY = torsoY + torsoH/2 + 0.24;
        const head = new THREE.Mesh(SP(0.17), skinMat);
        head.position.set(0, headY, 0);
        head.castShadow = true;
        g.add(head);
        for (const sz of [-1, 1]) {
            const eye = new THREE.Mesh(SP(0.02), eyeMat);
            eye.position.set(0.14, headY + 0.02, sz * 0.06);
            g.add(eye);
        }
        const noseMesh = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.06, 0.06), skinMat);
        noseMesh.position.set(0.16, headY - 0.03, 0);
        g.add(noseMesh);
        if (T.beard) {
            const beardMat = new THREE.MeshLambertMaterial({ color: T.beard });
            const beard = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.14, 0.18), beardMat);
            beard.position.set(0.06, headY - 0.18, 0);
            g.add(beard);
        }
        if (T.hair) {
            const hairMat = new THREE.MeshLambertMaterial({ color: T.hair });
            const hair = new THREE.Mesh(SP(0.16), hairMat);
            hair.scale.set(1, 0.55, 1);
            hair.position.set(-0.01, headY + 0.08, 0);
            g.add(hair);
        }

        // ARMS — flush against torso, overlapping at shoulder
        const armOff = torsoW / 2 + 0.055;
        for (const sz of [-1, 1]) {
            const upper = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.28, 0.13), tunicMat);
            upper.position.set(0, torsoY - 0.02, sz * armOff);
            g.add(upper);
            const lower = new THREE.Mesh(new THREE.BoxGeometry(0.11, 0.22, 0.11), skinMat);
            lower.position.set(0, torsoY - 0.27, sz * armOff);
            g.add(lower);
            const hand = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.07, 0.09), skinMat);
            hand.position.set(0, torsoY - 0.41, sz * armOff);
            g.add(hand);
        }

        // LEGS — two chunky columns under the torso
        const legs = [];
        for (const sz of [-1, 1]) {
            const pivot = new THREE.Group();
            pivot.position.set(0, torsoY - torsoH/2, sz * 0.11);
            const leg = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.52, 0.14), pantsMat);
            leg.position.y = -0.26;
            pivot.add(leg);
            const boot = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.12, 0.18), bootMat);
            boot.position.set(0.01, -0.56, 0);
            pivot.add(boot);
            g.add(pivot);
            legs.push(pivot);
        }
        g.userData.legs = legs;
        g.userData.head = head;

        // ======= TYPE-SPECIFIC ACCESSORIES =======
        if (type === 'blacksmith') {
            // Thick leather apron covering front
            const apron = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.55, 0.40),
                new THREE.MeshLambertMaterial({ color: T.apron }));
            apron.position.set(0.17, 0.85, 0);
            g.add(apron);
            // Apron strap over shoulders
            for (const sz of [-1, 1]) {
                const strap = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.30, 0.04),
                    new THREE.MeshLambertMaterial({ color: T.apron }));
                strap.position.set(0.10, 1.15, sz * 0.12);
                strap.rotation.z = sz * -0.15;
                g.add(strap);
            }
        }
        if (type === 'farmer') {
            // Wide straw hat
            const hatMat = new THREE.MeshLambertMaterial({ color: T.hat });
            const brim = new THREE.Mesh(CY(0.30, 0.30, 0.03, 12), hatMat);
            brim.position.set(0, 1.60, 0);
            g.add(brim);
            const crown = new THREE.Mesh(CY(0.16, 0.18, 0.12, 10), hatMat);
            crown.position.set(0, 1.68, 0);
            g.add(crown);
            // Hoe in right hand
            const hoeH = new THREE.Mesh(CY(0.018, 0.018, 1.1, 5),
                new THREE.MeshLambertMaterial({ color: 0x5a3818 }));
            hoeH.position.set(0, 0.90, armOff + 0.05);
            g.add(hoeH);
            const hoeB = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.14, 0.20),
                new THREE.MeshLambertMaterial({ color: 0x4a4a4a }));
            hoeB.position.set(0, 1.48, armOff + 0.05);
            g.add(hoeB);
        }
        if (type === 'baker') {
            // White apron
            const apron = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.50, 0.38),
                new THREE.MeshLambertMaterial({ color: T.apron }));
            apron.position.set(0.17, 0.85, 0);
            g.add(apron);
            // Round belly (extra sphere under apron)
            const belly = new THREE.Mesh(SP(0.14), tunicMat);
            belly.position.set(0.16, 0.95, 0);
            g.add(belly);
        }
        if (type === 'chief') {
            g.scale.set(1.08, 1.08, 1.08);
            // Fur collar
            const fur = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.07, 8, 16),
                new THREE.MeshLambertMaterial({ color: T.fur }));
            fur.rotation.x = Math.PI / 2;
            fur.position.set(0, 1.26, 0);
            g.add(fur);
            // Cloak hanging behind
            const cloak = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.75, 0.48),
                new THREE.MeshLambertMaterial({ color: T.cloak }));
            cloak.position.set(-0.18, 0.95, 0);
            g.add(cloak);
            // Gold belt
            const belt = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.022, 6, 16),
                new THREE.MeshLambertMaterial({ color: 0xb8a040 }));
            belt.rotation.x = Math.PI / 2;
            belt.position.set(0, 0.76, 0);
            g.add(belt);
        }
        if (type === 'librarian') {
            // Long robe covering everything from shoulders to feet
            const robe = new THREE.Mesh(new THREE.BoxGeometry(0.34, 1.05, 0.46),
                new THREE.MeshLambertMaterial({ color: T.robe }));
            robe.position.set(0, 0.75, 0);
            g.add(robe);
            // Hood
            const hood = new THREE.Mesh(SP(0.18),
                new THREE.MeshLambertMaterial({ color: T.robe }));
            hood.scale.set(0.85, 0.9, 0.65);
            hood.position.set(-0.04, 1.50, 0);
            g.add(hood);
            // Book in left hand
            const book = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.16, 0.12),
                new THREE.MeshLambertMaterial({ color: 0x3a2210 }));
            book.position.set(0, 0.63, -(armOff + 0.02));
            g.add(book);
            // Rope belt
            const rope = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.015, 6, 16),
                new THREE.MeshLambertMaterial({ color: 0xc8b078 }));
            rope.rotation.x = Math.PI / 2;
            rope.position.set(0, 0.76, 0);
            g.add(rope);
        }
        if (type === 'guard') {
            // Helmet covering head
            const hMat = new THREE.MeshLambertMaterial({ color: T.helmet });
            const helm = new THREE.Mesh(SP(0.175), hMat);
            helm.position.set(0, 1.47, 0);
            g.add(helm);
            const noseG = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.20, 0.03), hMat);
            noseG.position.set(0.16, 1.40, 0);
            g.add(noseG);
            // Sword on right hip
            const sw = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.50, 0.05),
                new THREE.MeshLambertMaterial({ color: 0xb0b0b0 }));
            sw.position.set(0.02, 0.52, armOff + 0.10);
            sw.rotation.x = 0.08;
            g.add(sw);
            // Shield on left arm
            const sh = new THREE.Mesh(CY(0.18, 0.18, 0.04, 10),
                new THREE.MeshLambertMaterial({ color: 0x6a4020 }));
            sh.rotation.z = Math.PI / 2;
            sh.position.set(0.05, 0.85, -(armOff + 0.08));
            g.add(sh);
        }

        return g;
    }

    // ----- Village builder with multiple layouts + spacing rules + paths -----
    function buildVillage(cx, cz) {
        // Flatten the entire village center area first
        flattenAt(cx, cz, 30.0, sampleGroundY(cx, cz));
        _terrainEdited = true;

        const layout = Math.random();   // 0..1 picks a layout style
        const houseCount = 6 + (Math.random() * 12 | 0);   // 6..17 houses
        const placed = [];               // {x, z, facing}
        const MIN_HOUSE_SPACING = 16;    // m

        function tryPlace(px, pz, facing) {
            // Min spacing to other houses + the well
            if (Math.hypot(px - cx, pz - cz) < 11) return false;
            for (const p of placed) {
                if (Math.hypot(p.x - px, p.z - pz) < MIN_HOUSE_SPACING) return false;
            }
            // Local flatness
            const ph = heightAt(px, pz);
            const flat = Math.abs(heightAt(px+6, pz) - ph) +
                         Math.abs(heightAt(px-6, pz) - ph) +
                         Math.abs(heightAt(px, pz+6) - ph) +
                         Math.abs(heightAt(px, pz-6) - ph);
            if (flat > 3.5) return false;
            // Avoid the river
            if (distToRiver(px, pz) < 60) return false;
            // World bounds
            if (Math.abs(px) > WORLD/2 - 30 || Math.abs(pz) > WORLD/2 - 30) return false;
            placed.push({ x: px, z: pz, facing });
            return true;
        }

        if (layout < 0.34) {
            // CLUSTER — random angle/radius around the center
            for (let attempt = 0; attempt < 400 && placed.length < houseCount; attempt++) {
                const ang = Math.random() * Math.PI * 2;
                const r = rand(18, 60);
                const px = cx + Math.cos(ang) * r;
                const pz = cz + Math.sin(ang) * r;
                tryPlace(px, pz, Math.atan2(cx - px, cz - pz));
            }
        } else if (layout < 0.67) {
            // LINEAR — houses lined up on either side of a road
            const heading = Math.random() * Math.PI * 2;
            const cosH = Math.cos(heading), sinH = Math.sin(heading);
            const spacing = rand(20, 26);
            const sideOff = rand(11, 14);
            const half = Math.ceil(houseCount / 2);
            for (let i = -half; i <= half && placed.length < houseCount; i++) {
                if (i === 0) continue;     // gap for the well
                for (const side of [-1, 1]) {
                    const along = i * spacing + rand(-2, 2);
                    const off   = side * (sideOff + rand(-1.5, 1.5));
                    const px = cx + cosH * along + sinH * off;
                    const pz = cz + sinH * along - cosH * off;
                    // Houses face the road
                    tryPlace(px, pz, Math.atan2(-sinH * side, cosH * side));
                    if (placed.length >= houseCount) break;
                }
            }
        } else {
            // SCATTERED — wider spread, irregular spacing
            for (let attempt = 0; attempt < 600 && placed.length < houseCount; attempt++) {
                const ang = Math.random() * Math.PI * 2;
                const r = rand(20, 90);
                const px = cx + Math.cos(ang) * r;
                const pz = cz + Math.sin(ang) * r;
                tryPlace(px, pz, Math.random() * Math.PI * 2);
            }
        }

        // Build the well at the center
        buildWell(cx, cz);

        // Assign villager types to houses — guarantee exactly 1 chief
        const typePool = VILLAGER_TYPES.filter(t => t.name !== 'chief');
        let chiefAssigned = false;
        const chiefIdx = Math.floor(Math.random() * placed.length);
        for (let i = 0; i < placed.length; i++) {
            if (i === chiefIdx) {
                placed[i].type = 'chief';
                chiefAssigned = true;
            } else {
                placed[i].type = typePool[Math.floor(Math.random() * typePool.length)].name;
            }
        }

        // Build all the placed houses with their assigned type
        for (const p of placed) {
            buildHouse(p.x, p.z, p.facing, p.type);
        }

        // Each house's door is on the front face — facing wraps the house so
        // its +Z (in local frame) points along (sin(facing), cos(facing)) in
        // world space. The door is at front-center, so:
        //   doorWorld = housePos + (sin(facing), cos(facing)) * (d/2 + step)
        // We use ~5.5 m as a typical "front of door" offset.
        const DOOR_OFFSET = 5.8;
        function doorPoint(p) {
            return {
                x: p.x + Math.sin(p.facing) * DOOR_OFFSET,
                z: p.z + Math.cos(p.facing) * DOOR_OFFSET,
            };
        }

        // Main paths: well -> in front of each door
        for (const p of placed) {
            const dp = doorPoint(p);
            buildPath(cx, cz, dp.x, dp.z, 1.5);
        }
        // Cross-paths between nearest door fronts (sparse, organic)
        for (let i = 0; i < placed.length; i++) {
            let bestJ = -1, bestD = 1e9;
            for (let j = 0; j < placed.length; j++) {
                if (i === j) continue;
                const dd = Math.hypot(placed[i].x - placed[j].x, placed[i].z - placed[j].z);
                if (dd < bestD) { bestD = dd; bestJ = j; }
            }
            if (bestJ >= 0 && bestD < 38 && Math.random() < 0.55) {
                const a = doorPoint(placed[i]);
                const b = doorPoint(placed[bestJ]);
                buildPath(a.x, a.z, b.x, b.z, 1.2);
            }
        }

        // Spawn one villager per house
        for (const p of placed) {
            const dp = doorPoint(p);
            const vObj = buildVillager(p.type);
            const vy = sampleGroundY(dp.x, dp.z);
            vObj.position.set(dp.x, vy, dp.z);
            vObj.rotation.y = p.facing;
            propRoot.add(vObj);
            // Work position: near house for most, center for chief
            const workX = p.type === 'chief' ? cx : p.x + Math.sin(p.facing) * 3;
            const workZ = p.type === 'chief' ? cz : p.z + Math.cos(p.facing) * 3;
            villagers.push({
                obj: vObj, type: p.type,
                homeX: p.x, homeZ: p.z,
                workX, workZ,
                wellX: cx, wellZ: cz,
                state: 'idle', stateT: rand(0, 3),
                x: dp.x, z: dp.z,
                speed: 0, phase: rand(0, Math.PI * 2),
                dirX: 0, dirZ: 0,
            });
        }
    }

    // ===================================================================
    //  MEDIEVAL CASTLES — walled fortifications on hilltops
    // ===================================================================
    const castleStone   = new THREE.MeshLambertMaterial({ color: 0x7a7268, flatShading: true });
    const castleStoneDk = new THREE.MeshLambertMaterial({ color: 0x5a5248, flatShading: true });
    const castleRoof    = new THREE.MeshLambertMaterial({ color: 0x4a3020 });
    const castleWood    = new THREE.MeshLambertMaterial({ color: 0x5a3818 });
    const castleWoodDk  = new THREE.MeshLambertMaterial({ color: 0x3a2210 });
    const castleIron    = new THREE.MeshLambertMaterial({ color: 0x4a4a4a });
    const castleBanner  = new THREE.MeshLambertMaterial({ color: 0x8a2020, side: THREE.DoubleSide });
    const castleGold    = new THREE.MeshLambertMaterial({ color: 0xb8a040 });
    const castleCarpet  = new THREE.MeshLambertMaterial({ color: 0x8a2020, side: THREE.DoubleSide });
    const castleDirt    = new THREE.MeshLambertMaterial({ color: 0x7a6a50 });
    const castleDark    = new THREE.MeshLambertMaterial({ color: 0x1a1a1a });

    function buildCastle(cx, cz) {
        // --- Terrain prep ---
        const anchorY = sampleGroundY(cx, cz);
        flattenAt(cx, cz, 85, anchorY);
        _terrainEdited = true;
        const g = new THREE.Group();
        g.position.set(cx, anchorY, cz);

        // === Dimensions ===
        const outerHalf = 60;   // 120m / 2
        const innerHalf = 35;   // 70m / 2
        const innerOffZ = -8;   // inner ward offset toward back (+X = front in our coords, so negative = back)
        const oWallH = 10, oWallT = 2.5;
        const iWallH = 8, iWallT = 2;
        const oGateW = 8, oGateH = 7;
        const iGateW = 6, iGateH = 6;

        // Helper: build battlements along a wall
        function addBattlements(wx, wz, len, wallH2, thick, isXWall) {
            const mW = 0.8, mH = 1, mGap = 0.8;
            const count = Math.floor(len / (mW + mGap));
            for (let m = 0; m < count; m++) {
                const off = (m - (count - 1) / 2) * (mW + mGap);
                const merlon = new THREE.Mesh(
                    new THREE.BoxGeometry(isXWall ? thick + 0.2 : mW, mH, isXWall ? mW : thick + 0.2),
                    castleStoneDk
                );
                merlon.position.set(wx + (isXWall ? 0 : off), wallH2 + mH / 2, wz + (isXWall ? off : 0));
                g.add(merlon);
            }
            // Wall walk platform
            const walk = new THREE.Mesh(
                new THREE.BoxGeometry(isXWall ? thick + 0.5 : len, 0.3, isXWall ? len : thick + 0.5),
                castleStoneDk
            );
            walk.position.set(wx, wallH2, wz);
            g.add(walk);
        }

        // Helper: build a tower with conical roof, arrow slits, flag
        function addTower(tx, tz, r, h, roofR, roofH, numSlits) {
            const tower = new THREE.Mesh(CY(r, r, h, 12), castleStone);
            tower.position.set(tx, h / 2, tz);
            g.add(tower);
            const roof = new THREE.Mesh(new THREE.ConeGeometry(roofR, roofH, 12), castleRoof);
            roof.position.set(tx, h + roofH / 2, tz);
            g.add(roof);
            for (let s = 0; s < numSlits; s++) {
                const ang = (s / numSlits) * Math.PI * 2;
                const slit = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.2, 0.3), castleDark);
                slit.position.set(tx + Math.sin(ang) * (r + 0.1), h * 0.45 + s * 2, tz + Math.cos(ang) * (r + 0.1));
                slit.rotation.y = ang;
                g.add(slit);
            }
            // Flag pole + banner
            const pole = new THREE.Mesh(CY(0.08, 0.08, 3, 4), castleIron);
            pole.position.set(tx, h + roofH + 1.5, tz);
            g.add(pole);
            const banner = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), castleBanner);
            banner.position.set(tx + 0.8, h + roofH + 1, tz);
            banner.rotation.y = Math.PI / 4;
            g.add(banner);
        }

        // Helper: build a portcullis (iron grid)
        function addPortcullis(px, pz, gw, gh) {
            for (let bx = -gw / 2 + 0.3; bx <= gw / 2 - 0.3; bx += 0.6) {
                const bar = new THREE.Mesh(new THREE.BoxGeometry(0.1, gh - 0.5, 0.1), castleIron);
                bar.position.set(px + bx, gh / 2 + 0.5, pz);
                g.add(bar);
            }
            for (let by = 1; by < gh; by += 1.0) {
                const hbar = new THREE.Mesh(new THREE.BoxGeometry(gw - 0.5, 0.1, 0.1), castleIron);
                hbar.position.set(px, by + 0.5, pz);
                g.add(hbar);
            }
        }

        // =====================================================
        //  2. OUTER WALLS (120×120m)
        // =====================================================
        const oCorners = [
            { x: -outerHalf, z: -outerHalf },
            { x:  outerHalf, z: -outerHalf },
            { x: -outerHalf, z:  outerHalf },
            { x:  outerHalf, z:  outerHalf },
        ];
        // Back wall
        const oBackLen = outerHalf * 2 - 10; // minus tower radii
        const oBackWall = new THREE.Mesh(new THREE.BoxGeometry(oBackLen, oWallH, oWallT), castleStone);
        oBackWall.position.set(0, oWallH / 2, -outerHalf);
        g.add(oBackWall);
        addBattlements(0, -outerHalf, oBackLen, oWallH, oWallT, false);
        // Left wall
        const oSideLen = outerHalf * 2 - 10;
        const oLeftWall = new THREE.Mesh(new THREE.BoxGeometry(oWallT, oWallH, oSideLen), castleStone);
        oLeftWall.position.set(-outerHalf, oWallH / 2, 0);
        g.add(oLeftWall);
        addBattlements(-outerHalf, 0, oSideLen, oWallH, oWallT, true);
        // Right wall
        const oRightWall = new THREE.Mesh(new THREE.BoxGeometry(oWallT, oWallH, oSideLen), castleStone);
        oRightWall.position.set(outerHalf, oWallH / 2, 0);
        g.add(oRightWall);
        addBattlements(outerHalf, 0, oSideLen, oWallH, oWallT, true);
        // Front wall — two segments with gate gap
        const oFrontSegLen = (outerHalf * 2 - 10 - oGateW) / 2;
        for (let side = -1; side <= 1; side += 2) {
            const segX = side * (oGateW / 2 + oFrontSegLen / 2);
            const wallM = new THREE.Mesh(new THREE.BoxGeometry(oFrontSegLen, oWallH, oWallT), castleStone);
            wallM.position.set(segX, oWallH / 2, outerHalf);
            g.add(wallM);
            addBattlements(segX, outerHalf, oFrontSegLen, oWallH, oWallT, false);
        }

        // 3. OUTER CORNER TOWERS (4x)
        for (const c of oCorners) {
            addTower(c.x, c.z, 5, 16, 6.5, 5, 4);
        }

        // 4. OUTER MID-WALL TOWERS (4x, one per wall midpoint)
        addTower(0, -outerHalf, 3.5, 13, 4.5, 4, 3);       // back mid
        addTower(-outerHalf, 0, 3.5, 13, 4.5, 4, 3);       // left mid
        addTower(outerHalf, 0, 3.5, 13, 4.5, 4, 3);        // right mid
        addTower(0, outerHalf + 0.01, 3.5, 13, 4.5, 4, 3); // front mid (behind gate)

        // =====================================================
        //  5. MAIN GATE (front center, z = +outerHalf)
        // =====================================================
        // Two flanking gate towers
        for (let side = -1; side <= 1; side += 2) {
            const gtx = side * (oGateW / 2 + 2);
            addTower(gtx, outerHalf, 4, 15, 5, 4, 3);
        }
        // Stone lintel above gate
        const oLintel = new THREE.Mesh(new THREE.BoxGeometry(oGateW + 2, 2, oWallT + 1), castleStoneDk);
        oLintel.position.set(0, oGateH + 1, outerHalf);
        g.add(oLintel);
        // Portcullis
        addPortcullis(0, outerHalf, oGateW, oGateH);
        // Heavy wooden gate doors (angled slightly open)
        for (let side = -1; side <= 1; side += 2) {
            const door = new THREE.Mesh(new THREE.BoxGeometry(oGateW / 2 - 0.3, oGateH - 0.3, 0.5), castleWoodDk);
            door.position.set(side * (oGateW / 4), oGateH / 2, outerHalf + oWallT / 2 + 0.3);
            door.rotation.y = side * 0.3;
            g.add(door);
        }
        // Torch brackets on gate
        for (let side = -1; side <= 1; side += 2) {
            const bracket = new THREE.Mesh(CY(0.08, 0.08, 0.6, 4), castleIron);
            bracket.position.set(side * (oGateW / 2 + 0.5), oGateH - 1, outerHalf + oWallT / 2 + 0.2);
            bracket.rotation.z = side * 0.4;
            g.add(bracket);
            const torchGlow = new THREE.Mesh(SP(0.25), new THREE.MeshBasicMaterial({ color: 0xff8800 }));
            torchGlow.position.set(side * (oGateW / 2 + 0.8), oGateH - 0.5, outerHalf + oWallT / 2 + 0.2);
            g.add(torchGlow);
        }

        // =====================================================
        //  6. INNER WALLS (70×70m, offset toward back)
        // =====================================================
        const iCx = 0, iCz = innerOffZ; // inner ward center
        const iCorners = [
            { x: iCx - innerHalf, z: iCz - innerHalf },
            { x: iCx + innerHalf, z: iCz - innerHalf },
            { x: iCx - innerHalf, z: iCz + innerHalf },
            { x: iCx + innerHalf, z: iCz + innerHalf },
        ];
        // Back inner wall
        const iBackLen = innerHalf * 2 - 7;
        const iBackWall = new THREE.Mesh(new THREE.BoxGeometry(iBackLen, iWallH, iWallT), castleStone);
        iBackWall.position.set(iCx, iWallH / 2, iCz - innerHalf);
        g.add(iBackWall);
        addBattlements(iCx, iCz - innerHalf, iBackLen, iWallH, iWallT, false);
        // Left inner wall
        const iSideLen = innerHalf * 2 - 7;
        const iLeftWall = new THREE.Mesh(new THREE.BoxGeometry(iWallT, iWallH, iSideLen), castleStone);
        iLeftWall.position.set(iCx - innerHalf, iWallH / 2, iCz);
        g.add(iLeftWall);
        addBattlements(iCx - innerHalf, iCz, iSideLen, iWallH, iWallT, true);
        // Right inner wall
        const iRightWall = new THREE.Mesh(new THREE.BoxGeometry(iWallT, iWallH, iSideLen), castleStone);
        iRightWall.position.set(iCx + innerHalf, iWallH / 2, iCz);
        g.add(iRightWall);
        addBattlements(iCx + innerHalf, iCz, iSideLen, iWallH, iWallT, true);
        // Front inner wall — two segments with gate gap
        const iFrontSegLen = (innerHalf * 2 - 7 - iGateW) / 2;
        for (let side = -1; side <= 1; side += 2) {
            const segX = iCx + side * (iGateW / 2 + iFrontSegLen / 2);
            const wallM = new THREE.Mesh(new THREE.BoxGeometry(iFrontSegLen, iWallH, iWallT), castleStone);
            wallM.position.set(segX, iWallH / 2, iCz + innerHalf);
            g.add(wallM);
            addBattlements(segX, iCz + innerHalf, iFrontSegLen, iWallH, iWallT, false);
        }

        // 7. INNER CORNER TOWERS (4x)
        for (const c of iCorners) {
            addTower(c.x, c.z, 3.5, 12, 4.5, 3.5, 3);
        }

        // =====================================================
        //  8. INNER GATE (front of inner wall)
        // =====================================================
        for (let side = -1; side <= 1; side += 2) {
            addTower(iCx + side * (iGateW / 2 + 1.5), iCz + innerHalf, 3, 11, 4, 3, 2);
        }
        const iLintel = new THREE.Mesh(new THREE.BoxGeometry(iGateW + 1.5, 1.5, iWallT + 0.5), castleStoneDk);
        iLintel.position.set(iCx, iGateH + 0.75, iCz + innerHalf);
        g.add(iLintel);
        addPortcullis(iCx, iCz + innerHalf, iGateW, iGateH);

        // =====================================================
        //  9. THE KEEP / PALACE (inside inner walls)
        // =====================================================
        const keepW = 30, keepD = 20, keepH = 14;
        const keepCenterX = iCx;
        const keepCenterZ = iCz - 3; // centered-ish inside inner ward
        const kx = keepCenterX, kz = keepCenterZ;
        // Keep walls (DoubleSide so interior visible)
        const keepStoneMat = new THREE.MeshLambertMaterial({ color: 0x7a7268, flatShading: true, side: THREE.DoubleSide });
        const keepMesh = new THREE.Mesh(new THREE.BoxGeometry(keepW, keepH, keepD), keepStoneMat);
        keepMesh.position.set(kx, keepH / 2, kz);
        g.add(keepMesh);
        // Peaked roof with proper slope formula
        const keepRoofH = 8;
        const keepSlopeRun = keepD / 2;
        const keepSlopeLen = Math.sqrt(keepSlopeRun * keepSlopeRun + keepRoofH * keepRoofH);
        const keepSlopeAng = Math.atan2(keepRoofH, keepSlopeRun);
        // Two slope planes
        for (let side = -1; side <= 1; side += 2) {
            const slopeGeo = new THREE.PlaneGeometry(keepW, keepSlopeLen);
            const slope = new THREE.Mesh(slopeGeo, castleRoof);
            slope.position.set(kx, keepH + keepRoofH / 2, kz + side * keepSlopeRun / 2);
            slope.rotation.x = side * (Math.PI / 2 - keepSlopeAng);
            g.add(slope);
        }
        // Gable ends (triangular approximation — thin wedge)
        for (let side = -1; side <= 1; side += 2) {
            const gableGeo = new THREE.ConeGeometry(keepD / 2, keepRoofH, 4);
            // We'll use simple triangles — a flat box approximation
            const gable = new THREE.Mesh(new THREE.BoxGeometry(0.3, keepRoofH, keepD * 0.7), castleStone);
            gable.position.set(kx + side * keepW / 2, keepH + keepRoofH / 2, kz);
            g.add(gable);
        }
        // Ridge beam
        const ridge = new THREE.Mesh(new THREE.BoxGeometry(keepW + 0.5, 0.3, 0.3), castleWoodDk);
        ridge.position.set(kx, keepH + keepRoofH, kz);
        g.add(ridge);

        // Keep windows
        for (let wx2 = -10; wx2 <= 10; wx2 += 5) {
            for (const wz2 of [kz - keepD / 2 - 0.1, kz + keepD / 2 + 0.1]) {
                const win = new THREE.Mesh(new THREE.BoxGeometry(1.0, 1.8, 0.3), castleDark);
                win.position.set(kx + wx2, keepH * 0.6, wz2);
                g.add(win);
            }
        }
        // Side windows
        for (let wz3 = -6; wz3 <= 6; wz3 += 4) {
            for (const wx3 of [kx - keepW / 2 - 0.1, kx + keepW / 2 + 0.1]) {
                const win = new THREE.Mesh(new THREE.BoxGeometry(0.3, 1.8, 1.0), castleDark);
                win.position.set(wx3, keepH * 0.6, kz + wz3);
                g.add(win);
            }
        }
        // Grand entrance door (front of keep, facing inner courtyard)
        const keepDoorZ = kz + keepD / 2 + 0.15;
        const keepDoor = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 0.4), castleWoodDk);
        keepDoor.position.set(kx, 2, keepDoorZ);
        g.add(keepDoor);

        // =====================================================
        //  10. KEEP INTERIOR — The Great Hall
        // =====================================================
        // Grand floor
        const hallFloor = new THREE.Mesh(
            new THREE.PlaneGeometry(keepW - 1, keepD - 1),
            castleWoodDk
        );
        hallFloor.rotation.x = -Math.PI / 2;
        hallFloor.position.set(kx, 0.15, kz);
        g.add(hallFloor);

        // Red carpet runner from door to throne
        const carpetLen = keepD - 2;
        const carpet = new THREE.Mesh(new THREE.PlaneGeometry(2, carpetLen), castleCarpet);
        carpet.rotation.x = -Math.PI / 2;
        carpet.position.set(kx, 0.17, kz);
        g.add(carpet);

        // Side carpets / rugs
        const rugBlue = new THREE.MeshLambertMaterial({ color: 0x2a3a6a, side: THREE.DoubleSide });
        const rugGreen = new THREE.MeshLambertMaterial({ color: 0x3a6a2a, side: THREE.DoubleSide });
        const rug1 = new THREE.Mesh(new THREE.PlaneGeometry(4, 3), rugBlue);
        rug1.rotation.x = -Math.PI / 2;
        rug1.position.set(kx - 8, 0.16, kz + 2);
        g.add(rug1);
        const rug2 = new THREE.Mesh(new THREE.PlaneGeometry(4, 3), rugGreen);
        rug2.rotation.x = -Math.PI / 2;
        rug2.position.set(kx + 8, 0.16, kz + 2);
        g.add(rug2);

        // Long feast table (10m × 2m)
        const table = new THREE.Mesh(new THREE.BoxGeometry(10, 0.3, 2), castleWood);
        table.position.set(kx, 1.2, kz + 1);
        g.add(table);
        // Table legs
        for (const tx of [-4, 4]) {
            for (const tz of [-0.7, 0.7]) {
                const leg = new THREE.Mesh(CY(0.15, 0.15, 1.05, 4), castleWood);
                leg.position.set(kx + tx, 0.55, kz + 1 + tz);
                g.add(leg);
            }
        }
        // Benches along table
        for (let side = -1; side <= 1; side += 2) {
            const bench = new THREE.Mesh(new THREE.BoxGeometry(9, 0.2, 0.6), castleWood);
            bench.position.set(kx, 0.6, kz + 1 + side * 1.6);
            g.add(bench);
            // Bench legs
            for (const bx of [-3.5, 0, 3.5]) {
                const bleg = new THREE.Mesh(CY(0.08, 0.08, 0.5, 4), castleWood);
                bleg.position.set(kx + bx, 0.3, kz + 1 + side * 1.6);
                g.add(bleg);
            }
        }

        // Throne platform (stone step)
        const thronePlat = new THREE.Mesh(new THREE.BoxGeometry(4, 0.3, 3), castleStoneDk);
        thronePlat.position.set(kx, 0.15, kz - keepD / 2 + 2.5);
        g.add(thronePlat);
        // Throne — tall-backed chair
        const throneSeat = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.3, 1.5), castleWoodDk);
        throneSeat.position.set(kx, 0.6, kz - keepD / 2 + 2.5);
        g.add(throneSeat);
        const throneBack = new THREE.Mesh(new THREE.BoxGeometry(2.2, 3, 0.3), castleWoodDk);
        throneBack.position.set(kx, 2.1, kz - keepD / 2 + 1.8);
        g.add(throneBack);
        // Throne gold accents (trim on back)
        const throneTrim = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.4, 0.15), castleGold);
        throneTrim.position.set(kx, 3.4, kz - keepD / 2 + 1.85);
        g.add(throneTrim);
        const throneTrim2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 2.8, 0.15), castleGold);
        throneTrim2.position.set(kx - 0.9, 2.0, kz - keepD / 2 + 1.85);
        g.add(throneTrim2);
        const throneTrim3 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 2.8, 0.15), castleGold);
        throneTrim3.position.set(kx + 0.9, 2.0, kz - keepD / 2 + 1.85);
        g.add(throneTrim3);
        // Throne armrests
        for (const side2 of [-1, 1]) {
            const arm = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.8, 1.5), castleWoodDk);
            arm.position.set(kx + side2 * 1.0, 1.1, kz - keepD / 2 + 2.5);
            g.add(arm);
        }

        // Fireplaces on each side wall
        for (const side3 of [-1, 1]) {
            const fpX = kx + side3 * (keepW / 2 - 1.5);
            const fpZ2 = kz;
            const fp = new THREE.Mesh(new THREE.BoxGeometry(1, 3.5, 3), castleStoneDk);
            fp.position.set(fpX, 1.75, fpZ2);
            g.add(fp);
            const fpOpen = new THREE.Mesh(new THREE.BoxGeometry(0.5, 2, 1.8), new THREE.MeshLambertMaterial({ color: 0x1a0a00 }));
            fpOpen.position.set(fpX + side3 * (-0.3), 1, fpZ2);
            g.add(fpOpen);
            const fireGlow = new THREE.Mesh(SP(0.4), new THREE.MeshBasicMaterial({ color: 0xff6600 }));
            fireGlow.position.set(fpX + side3 * (-0.2), 0.5, fpZ2);
            g.add(fireGlow);
        }

        // Iron chandeliers (3)
        const candleMat = new THREE.MeshLambertMaterial({ color: 0xf0e0b0 });
        const flameMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        for (let ci = -1; ci <= 1; ci++) {
            const chanX = kx;
            const chanZ = kz + ci * 5;
            const chanY = keepH - 2;
            const chanRing = new THREE.Mesh(new THREE.TorusGeometry(1.5, 0.1, 6, 16), castleIron);
            chanRing.position.set(chanX, chanY, chanZ);
            chanRing.rotation.x = Math.PI / 2;
            g.add(chanRing);
            // Chain
            const chainLen = 2.5;
            const chain = new THREE.Mesh(CY(0.04, 0.04, chainLen, 4), castleIron);
            chain.position.set(chanX, chanY + chainLen / 2 + 0.1, chanZ);
            g.add(chain);
            // Candles (6 per chandelier)
            for (let cc = 0; cc < 6; cc++) {
                const ca = (cc / 6) * Math.PI * 2;
                const ccx = chanX + Math.cos(ca) * 1.5;
                const ccz = chanZ + Math.sin(ca) * 1.5;
                const candle = new THREE.Mesh(CY(0.06, 0.06, 0.4, 4), candleMat);
                candle.position.set(ccx, chanY + 0.2, ccz);
                g.add(candle);
                const flame = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.15, 4), flameMat);
                flame.position.set(ccx, chanY + 0.45, ccz);
                g.add(flame);
            }
        }

        // Wall banners (6 total, 3 per side)
        for (const side4 of [-1, 1]) {
            for (let bi = -1; bi <= 1; bi++) {
                const bx2 = kx + side4 * (keepW / 2 - 0.2);
                const bz2 = kz + bi * 5;
                const b = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 2), castleBanner);
                b.position.set(bx2, keepH * 0.7, bz2);

        // Weapon display on back wall (swords + shields)
        const shieldMat = new THREE.MeshLambertMaterial({ color: 0x6a3020 });
        for (let wd = -1; wd <= 1; wd += 2) {

        // =====================================================

        const guardPositions = [

        for (const gp of guardPositions) {

                state: 'idle', stateT: rand(0, 3),
                x: gx, z: gz,

    // --- Pick village locations FIRST, before placing trees ---
    const VILLAGE_TARGET = 5;
    for (let attempt = 0; attempt < 4000 && villageCenters.length < VILLAGE_TARGET; attempt++) {
        const cx = rand(-WORLD/2 + 120, WORLD/2 - 120);
        const cz = rand(-WORLD/2 + 120, WORLD/2 - 120);
        if (distToRiver(cx, cz) < 100) continue;
        const ch = heightAt(cx, cz);
        if (ch < 14 || ch > 26) continue;
        const b = biomeAt(cx, cz, ch);
        if (b !== 1 && b !== 2) continue;             // only dry plains / meadow
        // Flatness check
        const flat = Math.abs(heightAt(cx+8, cz) - ch) +
                     Math.abs(heightAt(cx-8, cz) - ch) +
                     Math.abs(heightAt(cx, cz+8) - ch) +
                     Math.abs(heightAt(cx, cz-8) - ch);
        if (flat > 2.5) continue;
        // Min distance from other villages
        let tooClose = false;
        for (const v of villageCenters) {
            if (Math.hypot(v.cx - cx, v.cz - cz) < 380) { tooClose = true; break; }
        }
        if (tooClose) continue;
        villageCenters.push({ cx, cz });
    }

    // --- Pick castle locations (on hills, away from villages) ---
    // Place a castle near each village — find the highest nearby point,
    // flatten it, and build the castle there. Guaranteed placement.
    const castleLocations = [];
    for (const v of villageCenters) {
        // Search for the highest point within 150-250m of the village
        let bestX = v.cx + 180, bestZ = v.cz, bestH = -Infinity;
        for (let attempt = 0; attempt < 200; attempt++) {
            const ang = rand(0, Math.PI * 2);
            const r = rand(150, 250);
            const tx = v.cx + Math.cos(ang) * r;
            const tz = v.cz + Math.sin(ang) * r;
            if (Math.abs(tx) > WORLD/2 - 100 || Math.abs(tz) > WORLD/2 - 100) continue;
            if (distToRiver(tx, tz) < 60) continue;
            const h = heightAt(tx, tz);
            if (h > bestH) { bestH = h; bestX = tx; bestZ = tz; }
        }
        // Check not too close to another castle
        let skip = false;
        for (const c of castleLocations) {
            if (Math.hypot(c.cx - bestX, c.cz - bestZ) < 300) { skip = true; break; }
        }
        if (!skip) castleLocations.push({ cx: bestX, cz: bestZ });
    }

    // ----- prop placement: rejection-sampled, biome-aware, river/village-aware -----

    // ===================================================================
    //  OBJ TREE MODELS — Quaternius stylized trees with textures
    // ===================================================================
    const objTreeCache = {};
    const objTreeTextures = {};

    // Pre-load textures
    const texLoader = new THREE.TextureLoader();
    function loadTex(path) {
        return new Promise(res => texLoader.load(path, t => { t.encoding = THREE.sRGBEncoding; res(t); }, undefined, () => res(null)));
    }

    // Pre-load an OBJ model
    const objLoader = new THREE.OBJLoader();
    function loadOBJ(path) {
        return new Promise((res, rej) => objLoader.load(path, res, undefined, rej));
    }

    // Material sets for OBJ trees, mapped by material name in the OBJ
    let objMaterials = {};

    async function loadObjTrees() {
        // Load textures
        const [treeBark, treeLeaves, pineLeaves, birchBark, birchLeavesGreen,
               birchLeavesYellow, leavesOrange, leavesRed, leavesDarkRed, barkDead] = await Promise.all([
            loadTex('assets/textures/trees/Tree_Bark.jpg'),
            loadTex('assets/textures/trees/Tree_Leaves.png'),
            loadTex('assets/textures/trees/Pine_Leaves.png'),
            loadTex('assets/textures/trees/Birch_Bark.png'),
            loadTex('assets/textures/trees/Birch_Leaves_Green.png'),
            loadTex('assets/textures/trees/Birch_Leaves_Yellow.png'),
            loadTex('assets/textures/trees/Leaves_Orange.png'),
            loadTex('assets/textures/trees/Leaves_Red.png'),
            loadTex('assets/textures/trees/Leaves_DarkRed.png'),
            loadTex('assets/textures/trees/Bark_Dead.png'),
        ]);

        // Build material sets
        objMaterials = {
            Tree:       { Bark: new THREE.MeshLambertMaterial({ map: treeBark }), Tree_Leaves: new THREE.MeshLambertMaterial({ map: treeLeaves, side: THREE.DoubleSide }) },
            TreeAutumn: { Bark: new THREE.MeshLambertMaterial({ map: treeBark }), Tree_Leaves: new THREE.MeshLambertMaterial({ map: leavesOrange, side: THREE.DoubleSide }) },
            TreeRed:    { Bark: new THREE.MeshLambertMaterial({ map: treeBark }), Tree_Leaves: new THREE.MeshLambertMaterial({ map: leavesRed, side: THREE.DoubleSide }) },
            Pine:       { Bark: new THREE.MeshLambertMaterial({ map: treeBark }), Pine_Leaves: new THREE.MeshLambertMaterial({ map: pineLeaves, side: THREE.DoubleSide }) },
            Birch:      { Birch_Bark: new THREE.MeshLambertMaterial({ map: birchBark }), Birch_Leaves: new THREE.MeshLambertMaterial({ map: birchLeavesGreen, side: THREE.DoubleSide }) },
            BirchYellow:{ Birch_Bark: new THREE.MeshLambertMaterial({ map: birchBark }), Birch_Leaves: new THREE.MeshLambertMaterial({ map: birchLeavesYellow, side: THREE.DoubleSide }) },
            DeadTree:   { Bark: new THREE.MeshLambertMaterial({ map: barkDead }), Tree_Leaves: new THREE.MeshLambertMaterial({ color: 0x3a3a30 }) },
            DeadBirch:  { Birch_Bark: new THREE.MeshLambertMaterial({ map: barkDead, color: 0xccccbb }), Birch_Leaves: new THREE.MeshLambertMaterial({ color: 0x3a3a30 }) },
        };

        // Load OBJ models
        const modelNames = [
            'Tree_1','Tree_2','Tree_3','Tree_4',
            'Pine_1','Pine_2','Pine_3',
            'Birch_1','Birch_2','Birch_3',
            'DeadTree_1','DeadTree_2','DeadTree_3',
            'DeadBirch_1','DeadBirch_2'
        ];
        await Promise.all(modelNames.map(async name => {
            try {
                objTreeCache[name] = await loadOBJ('assets/models/trees/' + name + '.obj');
            } catch(e) { console.warn('Failed to load', name, e); }
        }));
        console.log('OBJ trees loaded:', Object.keys(objTreeCache).length);
        const statusEl = document.getElementById('objstatus');
        if (statusEl) statusEl.textContent = 'TREES: loaded ' + Object.keys(objTreeCache).length + ' models, swapping…';
    }

    // Clone an OBJ tree with materials applied, scaled to match the game world
    function makeObjTree(modelName, matSetName, scale) {
        const src = objTreeCache[modelName];
        if (!src) return null;
        const matSet = objMaterials[matSetName];
        if (!matSet) return null;

        const tree = src.clone();
        // Map a material (by its .name) to one of our textured materials
        function mapMat(m) {
            if (!m) return m;
            const mname = m.name || '';
            if (matSet[mname]) return matSet[mname];
            if (mname) {
                const key = Object.keys(matSet).find(k => mname.toLowerCase().includes(k.toLowerCase().split('_')[0]));
                if (key) return matSet[key];
            }
            // Heuristic fallback: if the material name hints at leaves, use the leaf mat
            const leafKey = Object.keys(matSet).find(k => k.toLowerCase().includes('leaves'));
            const barkKey = Object.keys(matSet).find(k => k.toLowerCase().includes('bark'));
            if (mname.toLowerCase().includes('leaf') || mname.toLowerCase().includes('leaves')) {
                if (leafKey) return matSet[leafKey];
            }
            if (barkKey) return matSet[barkKey];
            return m;
        }

        tree.traverse(child => {
            if (child.isMesh) {
                if (Array.isArray(child.material)) {
                    child.material = child.material.map(mapMat);
                } else {
                    child.material = mapMat(child.material);
                }
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        // Scale to match game world (TREE constant is 2.6, OBJ models are ~1-2m, game trees are ~18-28m)
        // Source OBJ models are ~5.5 units tall; scale so final height roughly matches procedural trees
        const s = scale * 3.6;  // bumped so OBJ trees are clearly visible
        tree.scale.set(s, s * rand(0.85, 1.15), s);
        tree.rotation.y = Math.random() * Math.PI * 2;
        return tree;
    }

    // Biome-aware OBJ tree picker: returns a tree group or null
    function pickObjTree(biome, scale) {
        let modelName, matSet;
        const r = Math.random();
        if (biome <= 2) {
            // Plains/meadow: oak variants + occasional autumn
            const oaks = ['Tree_1','Tree_2','Tree_3','Tree_4'];
            modelName = oaks[Math.floor(Math.random() * oaks.length)];
            matSet = r < 0.6 ? 'Tree' : r < 0.85 ? 'TreeAutumn' : 'TreeRed';
        } else if (biome === 3) {
            // Woodland: mix of oak and birch
            if (r < 0.5) {
                modelName = ['Tree_1','Tree_2','Tree_3','Tree_4'][Math.floor(Math.random() * 4)];
                matSet = r < 0.3 ? 'TreeAutumn' : 'Tree';
            } else {
                modelName = ['Birch_1','Birch_2','Birch_3'][Math.floor(Math.random() * 3)];
                matSet = r < 0.75 ? 'Birch' : 'BirchYellow';
            }
        } else if (biome === 4) {
            // Dense forest: all types
            if (r < 0.35) {
                modelName = ['Tree_1','Tree_2','Tree_3','Tree_4'][Math.floor(Math.random() * 4)];
                matSet = Math.random() < 0.7 ? 'Tree' : 'TreeAutumn';
            } else if (r < 0.65) {
                modelName = ['Birch_1','Birch_2','Birch_3'][Math.floor(Math.random() * 3)];
                matSet = Math.random() < 0.6 ? 'Birch' : 'BirchYellow';
            } else {
                modelName = ['Pine_1','Pine_2','Pine_3'][Math.floor(Math.random() * 3)];
                matSet = 'Pine';
            }
        } else if (biome === 5) {
            // Highlands: pines
            modelName = ['Pine_1','Pine_2','Pine_3'][Math.floor(Math.random() * 3)];
            matSet = 'Pine';
        } else {
            // Mountains: dead trees
            if (r < 0.5) {
                modelName = ['DeadTree_1','DeadTree_2','DeadTree_3'][Math.floor(Math.random() * 3)];
                matSet = 'DeadTree';
            } else {
                modelName = ['DeadBirch_1','DeadBirch_2'][Math.floor(Math.random() * 2)];
                matSet = 'DeadBirch';
            }
        }
        return makeObjTree(modelName, matSet, scale);
    }

    function nearVillage(x, z) {
        for (const v of villageCenters) {
            if (Math.hypot(v.cx - x, v.cz - z) < VILLAGE_CLEAR) return true;
        }
        return false;
    }
    function nearCastle(x, z) {
        for (const c of castleLocations) {
            if (Math.hypot(c.cx - x, c.cz - z) < 80) return true;
        }
        return false;
    }

    const ATTEMPTS = 6000;     // scaled for the larger 1600 m world
    for (let i = 0; i < ATTEMPTS; i++) {
        const x = rand(-WORLD/2 + 10, WORLD/2 - 10);
        const z = rand(-WORLD/2 + 10, WORLD/2 - 10);
        const d = distToRiver(x, z);
        const h = heightAt(x, z);
        const b = biomeAt(x, z, h);

        const inRiver = d < RIVER_HALF + 1.5;
        const onBank  = d < BANK_HALF;
        if (inRiver) continue;

        const villageZone = nearVillage(x, z);
        const r = Math.random();

        if (villageZone) continue;
        if (nearCastle(x, z)) continue;

        if (b === 0 || (onBank && h < 4)) {
            if (r < 0.75) { const rk = makeRock(); rk.mesh.scale.setScalar(rand(0.3, 0.7)); place(rk.mesh, x, z, rk.sink * 0.6); }
            else continue;
        } else if (b === 1) {
            // Dry plains: bushes, very rare lone oaks
            if (r < 0.94) continue;
            else if (r < 0.985) { place(makeOak(rand(0.7, 1.0)), x, z, 0, true); tagLastTree('oak', b, 0.85); }
            else { const rk = makeRock(); rk.mesh.scale.setScalar(rand(0.4, 0.9)); place(rk.mesh, x, z, rk.sink); }
        } else if (b === 2) {
            // Meadow plains: lots of bushes, scattered oaks
            if (r < 0.7) continue;
            else if (r < 0.86) place(makeBush(), x, z, 0.2);
            else if (r < 0.97) { place(makeOak(rand(1.0, 1.35)), x, z, 0, true); tagLastTree('oak', b, 1.0); }
            else { const rk = makeRock(); place(rk.mesh, x, z, rk.sink); }
        } else if (b === 3) {
            // Light woodland: ~30% trees with open glades
            if (r < 0.30) { place(makeOak(rand(1.1, 1.5)), x, z, 0, true); tagLastTree('oak', b, 1.1); }
            else if (r < 0.42) { place(makeBirch(rand(1.0, 1.35)), x, z, 0, true); tagLastTree('birch', b, 1.0); }
            else if (r < 0.62) place(makeBush(), x, z, 0.2);
            else continue;
        } else if (b === 4) {
            // Dense forest
            if (r < 0.55) { place(makeOak(rand(1.15, 1.65)), x, z, 0, true); tagLastTree('oak', b, 1.2); }
            else if (r < 0.78) { place(makeBirch(rand(1.05, 1.55)), x, z, 0, true); tagLastTree('birch', b, 1.1); }
            else if (r < 0.92) place(makeBush(), x, z, 0.2);
            else continue;
        } else if (b === 5) {
            // Highlands: pines + rocks
            if (r < 0.4) { place(makePine(rand(1.05, 1.65)), x, z, 0, true); tagLastTree('pine', b, 1.15); }
            else if (r < 0.6) { const rk = makeRock(); place(rk.mesh, x, z, rk.sink); }
            else if (r < 0.78) place(makeBush(), x, z, 0.2);

        } else {
            // Mountains: big rocks, sparse dead pines
            if (r < 0.6) { const rk = makeRock(); rk.mesh.scale.setScalar(rand(1.2, 2.4)); place(rk.mesh, x, z, rk.sink); }
            else if (r < 0.75) { place(makeDeadTree(rand(0.95, 1.4)), x, z, 0, true); tagLastTree('dead', 6, 1.0); }

    // Helper to tag the most-recently-placed tree with metadata for OBJ swap
    function tagLastTree(kind, biome, objScale) {
        const t = trees[trees.length - 1];

    }

    // Kick off OBJ loading; replace procedural trees with textured OBJ trees when done
    loadObjTrees().then(() => {
        let replaced = 0;
        for (const t of trees) {
            if (!t.kind || !t.alive) continue;
            // Pick OBJ model + material set based on kind + biome
            let modelPool, matSet;
            if (t.kind === 'oak') {
                modelPool = ['Tree_1','Tree_2','Tree_3','Tree_4'];
                if (t.biome === 3 || t.biome === 4) {
                    // Woodland/forest: mostly green, some autumn
                    matSet = Math.random() < 0.75 ? 'Tree' : (Math.random() < 0.7 ? 'TreeAutumn' : 'TreeRed');
                } else {
                    // Plains/meadow: more green
                    matSet = Math.random() < 0.85 ? 'Tree' : 'TreeAutumn';
                }
            } else if (t.kind === 'birch') {
                modelPool = ['Birch_1','Birch_2','Birch_3'];
                matSet = Math.random() < 0.7 ? 'Birch' : 'BirchYellow';
            } else if (t.kind === 'pine') {
                modelPool = ['Pine_1','Pine_2','Pine_3'];
                matSet = 'Pine';
            } else if (t.kind === 'dead') {
                if (Math.random() < 0.5) { modelPool = ['DeadTree_1','DeadTree_2','DeadTree_3']; matSet = 'DeadTree'; }
                else { modelPool = ['DeadBirch_1','DeadBirch_2']; matSet = 'DeadBirch'; }
            }
            if (!modelPool) continue;
            const modelName = modelPool[Math.floor(Math.random() * modelPool.length)];
            const newObj = makeObjTree(modelName, matSet, t.objScale || 1.0);
            if (!newObj) continue;

            // Preserve position / rotation / ground-snap from the procedural tree
            newObj.position.copy(t.obj.position);
            newObj.rotation.y = t.obj.rotation.y;

            propRoot.remove(t.obj);
            // Dispose procedural tree meshes (cheap cleanup)
            t.obj.traverse(c => {
                if (c.isMesh) { c.geometry && c.geometry.dispose && c.geometry.dispose(); }
            });
            propRoot.add(newObj);
            t.obj = newObj;
            // Update baseRot for wind sway
            t.baseRotX = newObj.rotation.x;
            t.baseRotZ = newObj.rotation.z;
            replaced++;
        }
        console.log('Replaced', replaced, 'procedural trees with textured OBJ models');
        const statusEl2 = document.getElementById('objstatus');
        if (statusEl2) {
            statusEl2.style.color = '#8aff8a';
            statusEl2.style.borderColor = '#8aff8a';
            statusEl2.textContent = 'TREES: ' + replaced + ' textured trees placed';
            setTimeout(() => { statusEl2.style.transition = 'opacity 1.5s'; statusEl2.style.opacity = '0'; }, 3000);
        }
    }).catch(e => {
        console.warn('OBJ trees failed, keeping procedural:', e);
        const statusEl3 = document.getElementById('objstatus');
        if (statusEl3) {
            statusEl3.style.color = '#ff6060';

        a(SP(0.50), fur,    0.88, 0.88, 1.0,   0.55, 1.34, 0);     // shoulder hump
        a(SP(0.42), furDk,  1.45, 0.35, 0.85,  0,    1.52, 0);     // dark back ridge
        a(SP(0.40), furLt,  1.40, 0.40, 0.90,  0,    0.68, 0);     // lighter underbelly

        // --- THICK NECK ---
        a(CY(0.22,0.28,0.30), fur, 1,1,1, 0.92,1.18,0).rotation.z = -0.55;

        // --- HEAD: big round with broad snout ---
        const head = a(SP(0.34), fur, 1.0,1.0,1.0, 1.20,1.30,0);
        // Brow ridge (gives the bear a serious look)
        a(SP(0.18), furDk, 1.6, 0.55, 1.2, 1.28, 1.42, 0);
        // Snout (lighter, extended)
        a(SP(0.20), snoutM, 1.45, 0.85, 1.0, 1.46, 1.18, 0);
        a(SP(0.12), snoutM, 1.30, 0.75, 0.90, 1.58, 1.15, 0);    // snout tip
        // Nose (large, dark)
        a(SP(0.08), noseM, 1.2, 0.9, 1.1, 1.66, 1.20, 0);
        // Nostrils
        for (const sz of [-1,1])
            a(SP(0.012), black, 1,1,1, 1.72, 1.18, sz*0.02);
        // Mouth line
        a(SP(0.06), furDk, 2.0, 0.3, 0.8, 1.52, 1.10, 0);
        // Eyes — small, deep-set (bears have small eyes)
        for (const sz of [-1,1]) {
            a(SP(0.025), black, 1,1.1,1, 1.35, 1.40, sz*0.14);
            a(SP(0.007), eyeHi, 1,1,1, 1.355, 1.415, sz*0.132);
        }
        // Round ears — small relative to head
        for (const sz of [-1,1]) {
            a(SP(0.09), fur,  0.65,1.0,1.0, 1.06, 1.56, sz*0.24);
            a(SP(0.06), furLt, 0.45,0.85,0.85, 1.08, 1.56, sz*0.26);
        }

        // === LEGS: stocky with big paws and claws ===
        const legs = [];
        const lp = [
            { x: 0.55, z:-0.34 }, { x: 0.55, z:0.34 },
            { x:-0.55, z:-0.34 }, { x:-0.55, z:0.34 },
        ];
        for (const L of lp) {
            const pivot = new THREE.Group();
            pivot.position.set(L.x, 0.85, L.z);
            // Thick thigh
            const thigh = new THREE.Mesh(SP(0.15), fur);
            thigh.scale.set(0.85, 1.3, 0.85);
            thigh.position.y = -0.08; pivot.add(thigh);
            // Upper leg
            const bUleg = new THREE.Mesh(CY(0.14,0.15,0.38), fur);
            bUleg.position.set(0,-0.32,0); bUleg.castShadow = true;
            pivot.add(bUleg);
            // Lower leg
            const bLleg = new THREE.Mesh(CY(0.13,0.14,0.35), fur);
            bLleg.position.set(0,-0.62,0);
            pivot.add(bLleg);
            // Big paw
            const paw = new THREE.Mesh(SP(0.12), pawM);
            paw.scale.set(0.85, 0.4, 1.3);
            paw.position.set(0, -0.82, 0.02); pivot.add(paw);
            // Claws (5 per paw)
            for (let c = -2; c <= 2; c++) {
                const claw = new THREE.Mesh(new THREE.ConeGeometry(0.018, 0.065, 4), clawM);
                claw.rotation.x = -Math.PI / 2;
                claw.position.set(0, -0.82, 0.14 + c * 0.045);
                pivot.add(claw);
            }
            g.add(pivot); legs.push(pivot);
        }
        g.userData.legs = legs;
        g.userData.head = head;
        return g;
    }

    // ----- Behavior specs (anatomy is in the build* functions) -----
    // ===================================================================
    //  QUATERNIUS ANIMAL MODELS — GLTF with baked-in animations
    // ===================================================================
    const gltfLoader = new THREE.GLTFLoader();
    const animalModels = {};  // name -> { scene, animations: {clipName: clip} }

    function loadGLTF(path) {
        return new Promise((res, rej) => gltfLoader.load(path, res, undefined, rej));
    }

    async function loadAnimalModels() {
        const names = ['Deer','Stag','Fox','Wolf','Cow','Horse','Horse_White','Alpaca','Bull','Donkey','Husky','ShibaInu'];
        await Promise.all(names.map(async name => {
            try {
                const gltf = await loadGLTF('assets/models/animals/' + name + '.gltf');
                const clips = {};
                for (const clip of gltf.animations) clips[clip.name] = clip;
                animalModels[name] = { scene: gltf.scene, clips };
            } catch(e) { console.warn('Failed to load animal:', name, e); }
        }));
        console.log('Animal models loaded:', Object.keys(animalModels).length);
        const aEl = document.getElementById('animstatus');
        if (aEl) aEl.textContent = 'ANIMALS: loaded ' + Object.keys(animalModels).length + ' models, spawning…';
    }
