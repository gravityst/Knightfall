<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knightfall - Enlightened</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Playfair+Display:wght@700&family=IM+Fell+English+SC&display=swap');

        body {
            margin: 0; padding: 0; overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bg {
            position: absolute; inset: 0;
            background: url('./knightfall-bg.jpg') center/cover no-repeat;
            filter: brightness(0.92) contrast(1.08) saturate(1.12);
            z-index: -3;
        }

        .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(5,5,25,0.65), rgba(20,10,5,0.75));
            z-index: -2;
        }

        .lightning {
            position: absolute; inset: 0;
            background: rgba(230, 245, 255, 0.4);
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            animation: lightningFlash 6s infinite;
        }

        @keyframes lightningFlash {
            0%, 75% { opacity: 0; }
            77% { opacity: 0.7; }
            79% { opacity: 0; }
            82% { opacity: 0.45; }
            100% { opacity: 0; }
        }

        .title-container {
            text-align: center;
            z-index: 10;
            max-width: 980px;
            padding: 90px 40px 70px;
        }

        .main-title {
            font-family: 'UnifrakturCook', cursive;
            font-size: 8.4rem;
            color: #f0d8a0;
            text-shadow: 0 0 30px #ffd700, 12px 12px 0 #1a140f, -8px -8px 0 #1a140f;
            letter-spacing: 26px;
            margin: 0 0 10px 0;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 3.6rem;
            color: #d4b070;
            text-shadow: 8px 8px 0 #1a140f, 0 0 40px #ffd700;
            letter-spacing: 28px;
            margin: 0 0 50px 0;
        }

        .sword {
            width: 100%;
            max-width: 920px;
            margin: 30px auto 55px;
        }

        .description {
            font-size: 1.32rem;
            color: #c8b090;
            max-width: 760px;
            margin: 0 auto 65px;
            line-height: 1.9;
            text-shadow: 2px 2px 8px #000;
        }

        button {
            font-family: 'IM Fell English SC', serif;
            font-size: 1.9rem;
            padding: 28px 140px;
            background: linear-gradient(#e8c050, #ffd700);
            color: #1c1408;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 10px;
            box-shadow: 0 18px 0 #8b5a2b;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-12px);
            box-shadow: 0 28px 0 #8b5a2b;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="lightning"></div>

    <div class="title-container">
        <h1 class="main-title">KNIGHTFALL</h1>
        <div class="subtitle">ENLIGHTENED</div>
        
        <svg class="sword" viewBox="0 0 920 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="100" y="35" width="720" height="30" rx="8" fill="#c8c8c8"/>
            <polygon points="100,35 25,10 25,80" fill="#b0b0b0"/>
            <polygon points="820,35 895,10 895,80" fill="#b0b0b0"/>
            <rect x="55" y="22" width="65" height="56" rx="12" fill="#8b5a2b"/>
        </svg>

        <p class="description">
            A medieval world awaits. Explore vast lands, trade with merchants,<br>
            survive the wilds, and forge your legend in a realm of knights and castles.
        </p>

        <button onclick="beginJourney()">BEGIN YOUR JOURNEY</button>
    </div>

    <script>
        function beginJourney() {
            alert("🌩️ The storm calls... Your journey into the kingdom of Eldrath begins.");
        }
    </script>
</body>
</html>
