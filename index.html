<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knightfall - Enlightened</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Playfair+Display:wght@700&family=IM+Fell+English+SC&display=swap');

        body {
            margin: 0; padding: 0; overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bg {
            position: absolute; inset: 0;
            background: url('./knightfall-bg.jpg') center/cover no-repeat;
            filter: brightness(0.92) contrast(1.08) saturate(1.12);
            z-index: -3;
        }

        .overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(5,5,25,0.65), rgba(20,10,5,0.75));
            z-index: -2;
        }

        .lightning {
            position: absolute; inset: 0;
            background: rgba(230, 245, 255, 0.4);
            opacity: 0;
            pointer-events: none;
            z-index: -1;
            animation: lightningFlash 6s infinite;
        }

        @keyframes lightningFlash {
            0%, 75% { opacity: 0; }
            77% { opacity: 0.7; }
            79% { opacity: 0; }
            82% { opacity: 0.45; }
            100% { opacity: 0; }
        }

        .title-container {
            text-align: center;
            z-index: 10;
            max-width: 980px;
            padding: 90px 40px 70px;
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 8.4rem;
            color: #f0d8a0;
            text-shadow: 0 0 30px #ffd700, 12px 12px 0 #1a140f, -8px -8px 0 #1a140f;
            letter-spacing: 26px;
            margin: 0 0 10px 0;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 3.6rem;
            color: #d4b070;
            text-shadow: 8px 8px 0 #1a140f, 0 0 40px #ffd700;
            letter-spacing: 28px;
            margin: 0 0 50px 0;
        }

        .sword {
            width: 100%;
            max-width: 920px;
            margin: 30px auto 55px;
        }

        .description {
            font-size: 1.32rem;
            color: #c8b090;
            max-width: 760px;
            margin: 0 auto 65px;
            line-height: 1.9;
            text-shadow: 2px 2px 8px #000;
        }

        button {
            font-family: 'IM Fell English SC', serif;
            font-size: 1.5rem;
            padding: 16px 60px;
            background: linear-gradient(145deg, #d4af37, #ffd700, #b8860b);
            color: #1c1408;
            border: 3px solid #8b5a2b;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 6px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.4);
            background: linear-gradient(145deg, #ffd700, #ffed4e, #d4af37);
        }

        button:active {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="lightning"></div>

    <div class="title-container">
        <h1 class="main-title">KNIGHTFALL</h1>
        <div class="subtitle">ENLIGHTENED</div>
       

        <p class="description">
            A medieval world awaits. Explore vast lands, trade with merchants,<br>
            survive the wilds, and forge your legend in a realm of knights and castles.
        </p>

        <button onclick="window.location.href='game.html'">BEGIN YOUR JOURNEY</button>
    </div>

    <script>
        function beginJourney() {
            alert("🌩️ The storm calls... Your journey into the kingdom of Eldrath begins.");
        }
    </script>
</body>
</html>
