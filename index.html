<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knightfall - Enlightened</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Playfair+Display:wght@700&family=IM+Fell+English+SC&display=swap');

        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #05050f;
            color: #d4af37;
            font-family: 'IM Fell English SC', serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .bg {
            position: absolute; inset: 0;
            background: linear-gradient(rgba(5,5,25,0.9), rgba(20,10,5,0.95)),
                        url('https://picsum.photos/id/1015/1920/1080') center/cover;
            filter: brightness(0.52) contrast(1.28) saturate(0.85);
            z-index: -3;
        }

        .lightning {
            position: absolute; inset: 0;
            background: rgba(255, 240, 180, 0.22);
            opacity: 0;
            pointer-events: none;
            z-index: -2;
            animation: lightningFlash 8s infinite;
        }

        @keyframes lightningFlash {
            0%, 82% { opacity: 0; }
            84% { opacity: 0.4; }
            86% { opacity: 0; }
            89% { opacity: 0.25; }
            100% { opacity: 0; }
        }

        .title-container {
            text-align: center;
            z-index: 10;
            max-width: 940px;
            padding: 40px 30px;
        }

        .main-title {
            font-family: 'UnifrakturCook', cursive;
            font-size: 7.4rem;
            color: #e8d5a3;
            text-shadow: 10px 10px 0 #1a140f, 0 0 50px #ffd700;
            letter-spacing: 15px;
            margin: 0 0 8px 0;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-size: 2.85rem;
            color: #c0a070;
            margin: 0 0 45px 0;
            letter-spacing: 16px;
            text-shadow: 4px 4px 0 #000;
        }

        .sword-divider {
            width: 100%;
            max-width: 840px;
            height: 14px;
            background: linear-gradient(to right, transparent, #777, #ddd, #777, transparent);
            margin: 25px auto 40px;
            box-shadow: 0 0 25px #ffd700;
        }

        .sword-divider::before,
        .sword-divider::after {
            content: '⚔️';
            position: absolute;
            font-size: 72px;
            top: -48px;
            color: #d4af37;
        }
        .sword-divider::before { left: -55px; }
        .sword-divider::after { right: -55px; }

        .description {
            font-size: 1.2rem;
            color: #b8a080;
            max-width: 700px;
            margin: 0 auto 55px;
            line-height: 1.75;
        }

        button {
            font-family: 'IM Fell English SC', serif;
            font-size: 1.7rem;
            padding: 22px 110px;
            background: #d4af37;
            color: #1c1408;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 6px;
            box-shadow: 0 14px 0 #8b5a2b;
            transition: all 0.3s;
        }

        button:hover {
            background: #ffd700;
            transform: translateY(-10px);
            box-shadow: 0 20px 0 #8b5a2b;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="lightning"></div>

    <div class="title-container">
        <h1 class="main-title">KNIGHTFALL</h1>
        <div class="subtitle">ENLIGHTENED</div>
        
        <div class="sword-divider"></div>

        <p class="description">
            A medieval world awaits. Explore vast lands, trade with merchants,<br>
            survive the wilds, and forge your legend in a realm of knights and castles.
        </p>

        <button onclick="beginJourney()">BEGIN YOUR JOURNEY</button>
    </div>

    <script>
        function beginJourney() {
            alert("🌩️ The storm rages as you ride into the kingdom of Eldrath...\n\nYour adventure begins.");
        }
    </script>
</body>
</html>
